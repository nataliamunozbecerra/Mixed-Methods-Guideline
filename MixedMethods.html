document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"25ac20d3-e959-4157-baa2-f133b7392acb\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ebd2ae2f-838f-4347-9cad-a2faf11fce58\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}\n  html{scroll-behavior:smooth;}\n  body{background:#F4FAFD;}\n  ::selection{background:#F6C7CD;color:#292B2E;}\n  textarea,input,button{font-family:inherit;}\n  textarea{resize:vertical;}\n  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}\n  .ddetail{animation:fadeUp .22s ease both;}\n  ::-webkit-scrollbar{width:10px;height:10px;}\n  ::-webkit-scrollbar-thumb{background:#CDD9E1;border-radius:8px;border:2px solid #F4FAFD;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex;min-height:100vh;background:#F4FAFD;color:#292B2E;font-family:'DM Sans',system-ui,sans-serif;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;\">\n\n  <aside style=\"position:fixed;top:0;left:0;bottom:0;width:268px;background:#FFFFFF;border-right:1px solid #E1E9EF;display:flex;flex-direction:column;padding:26px 18px 18px;z-index:50;overflow-y:auto;\">\n    <div style=\"padding:0 8px 4px;\">\n      <img src=\"4c428cef-ae4c-4c82-8007-ca8308c66427\" alt=\"Holafly\" style=\"height:26px;width:auto;display:block;\">\n      <div style=\"font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#9DA7AE;margin-top:14px;\">UX Research · GEM<\u002Fdiv>\n      <div style=\"font-size:15px;font-weight:700;letter-spacing:-.01em;color:#292B2E;margin-top:3px;line-height:1.25;\">Mixed Methods<br>Guideline<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px;background:#E1E9EF;margin:18px 8px;\"><\u002Fdiv>\n    <nav style=\"display:flex;flex-direction:column;gap:2px;\">\n      <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"8\">\n        <a onclick=\"{{ item.onClick }}\" style=\"{{ item.rowStyle }}\">\n          <span style=\"{{ item.numStyle }}\">{{ item.n }}<\u002Fspan>\n          <span style=\"{{ item.labelStyle }}\">{{ item.label }}<\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-for>\n      <div style=\"height:1px;background:#E1E9EF;margin:14px 6px;\"><\u002Fdiv>\n      <div style=\"font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#9DA7AE;padding:2px 11px 6px;\">Part 02 · Rigor Audit<\u002Fdiv>\n      <sc-for list=\"{{ auditNavItems }}\" as=\"item\" hint-placeholder-count=\"8\">\n        <a onclick=\"{{ item.onClick }}\" style=\"{{ item.rowStyle }}\">\n          <span style=\"{{ item.numStyle }}\">{{ item.n }}<\u002Fspan>\n          <span style=\"{{ item.labelStyle }}\">{{ item.label }}<\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fnav>\n    <div style=\"margin-top:auto;padding:16px 8px 0;\">\n      <div style=\"font-size:11px;color:#9DA7AE;line-height:1.6;\">Holafly UX Research<br>Internal use · 2026<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <main style=\"margin-left:268px;flex:1;min-width:0;\">\n\n    <!-- HERO -->\n    <header data-screen-label=\"Hero\" style=\"padding:64px 56px 48px;background:linear-gradient(180deg,#EDF9FE 0%,#F4FAFD 100%);border-bottom:1px solid #E1E9EF;\">\n      <div style=\"display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#E6485C;background:#fff;border:1px solid #F6C7CD;border-radius:100px;padding:5px 13px;margin-bottom:22px;\">\n        <span style=\"width:7px;height:7px;border-radius:50%;background:#E6485C;display:inline-block;\"><\u002Fspan>Interactive guide\n      <\u002Fdiv>\n      <h1 style=\"font-size:clamp(34px,4.4vw,54px);font-weight:700;line-height:1.06;letter-spacing:-.025em;max-width:780px;\">Design rigorous research by <em style=\"color:#E6485C;font-style:italic;\">combining<\u002Fem> the right methods.<\u002Fh1>\n      <p style=\"font-size:16px;color:#6B6B6B;max-width:600px;line-height:1.7;margin-top:20px;\">A working guide to the Mixed Methods Guideline GEM — a strategic assistant that helps the team combine qualitative and quantitative research in a clear, scalable, and actionable way. Use the tools on this page to decide, plan, and prompt.<\u002Fp>\n      <div style=\"display:flex;gap:10px;margin-top:28px;flex-wrap:wrap;\">\n        <a onclick=\"{{ goCheck }}\" style=\"display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#fff;background:#E6485C;border-radius:10px;padding:11px 18px;cursor:pointer;\">Should I use mixed methods? →<\u002Fa>\n        <a onclick=\"{{ goBuild }}\" style=\"display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#292B2E;background:#fff;border:1px solid #E1E9EF;border-radius:10px;padding:11px 18px;cursor:pointer;\">Open the prompt builder<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- 01 WHAT IT IS -->\n    <section id=\"s1\" data-spy=\"\" data-screen-label=\"01 What it is\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;\">\n      <div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>01 — What it is<\u002Fdiv>\n      <h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:660px;\">A strategic mixed methods partner, not a methodology textbook<\u002Fh2>\n      <p style=\"font-size:15px;color:#6B6B6B;max-width:560px;line-height:1.7;margin:12px 0 36px;\">It helps the team design, execute, and synthesise mixed methods research that is practical, rigorous, and aligned to product decisions — without unnecessary academic complexity.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n        <sc-for list=\"{{ capabilities }}\" as=\"cap\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fff;border:1px solid #E1E9EF;border-radius:16px;padding:26px 24px;\">\n            <div style=\"font-size:26px;font-weight:700;color:#E6485C;letter-spacing:-.02em;line-height:1;margin-bottom:14px;\">{{ cap.num }}<\u002Fdiv>\n            <div style=\"font-size:15px;font-weight:600;margin-bottom:14px;\">{{ cap.title }}<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:0;\">\n              <sc-for list=\"{{ cap.items }}\" as=\"li\" hint-placeholder-count=\"3\">\n                <div style=\"font-size:13px;color:#6B6B6B;line-height:1.55;padding:9px 0 9px 16px;border-top:1px solid #E9F1F7;position:relative;\">\n                  <span style=\"position:absolute;left:0;top:15px;width:6px;height:6px;border-radius:50%;background:#E6485C;\"><\u002Fspan>{{ li }}\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 02 DESCRIPTION -->\n    <section id=\"s2\" data-spy=\"\" data-screen-label=\"02 Full description\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;\">\n      <div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>02 — Full description<\u002Fdiv>\n      <h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:660px;\">What this GEM is configured to do<\u002Fh2>\n      <p style=\"font-size:15px;color:#6B6B6B;max-width:560px;line-height:1.7;margin:12px 0 32px;\">The same role description the GEM operates from. Understanding it helps you write sharper inputs — and see the difference it makes.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:1.15fr .85fr;gap:20px;align-items:start;\">\n        <div style=\"background:#fff;border:1px solid #E1E9EF;border-radius:16px;overflow:hidden;\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:13px 20px;border-bottom:1px solid #E1E9EF;background:#EDF9FE;\">\n            <span style=\"font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#6B6B6B;\">GEM role description<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:22px 24px;font-size:13px;color:#6B6B6B;line-height:1.85;white-space:pre-wrap;\">{{ gemDesc }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div>\n          <div style=\"display:inline-flex;background:#E9F1F7;border-radius:10px;padding:3px;gap:3px;margin-bottom:14px;\">\n            <button onclick=\"{{ setCmpWithout }}\" style=\"{{ cmpBtnWithout }}\">Without the GEM<\u002Fbutton>\n            <button onclick=\"{{ setCmpWith }}\" style=\"{{ cmpBtnWith }}\">With the GEM<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"ddetail\" style=\"{{ cmpCardStyle }}\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;color:{{ cmpAccent }};\">{{ cmpTag }}<\u002Fdiv>\n            <div style=\"font-size:16px;font-weight:600;color:#292B2E;line-height:1.45;margin-bottom:10px;\">{{ cmpQuote }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#6B6B6B;line-height:1.65;\">{{ cmpBody }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#EDF9FE;border:1px solid #E1E9EF;border-radius:14px;padding:16px 18px;margin-top:12px;\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#C06A00;margin-bottom:7px;\">Critical constraint<\u002Fdiv>\n            <div style=\"font-size:13px;color:#6B6B6B;line-height:1.6;\">Never \"quant + qual because it sounds rigorous.\" Everything starts from research questions, uncertainty, decisions, maturity, and constraints.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 03 WHEN TO USE -->\n    <section id=\"s3\" data-spy=\"\" data-screen-label=\"03 When to use\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;background:#FFFCEE;\">\n      <div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>03 — Decision criteria<\u002Fdiv>\n      <h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:660px;\">Should you use mixed methods?<\u002Fh2>\n      <p style=\"font-size:15px;color:#6B6B6B;max-width:560px;line-height:1.7;margin:12px 0 32px;\">More methods is not always the answer. Toggle the statements that match your situation — the recommendation updates live.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;\">\n        <div style=\"display:flex;flex-direction:column;gap:9px;\">\n          <sc-for list=\"{{ dqItems }}\" as=\"q\" hint-placeholder-count=\"8\">\n            <div onclick=\"{{ q.onToggle }}\" style=\"{{ q.rowStyle }}\">\n              <span style=\"{{ q.boxStyle }}\">{{ q.check }}<\u002Fspan>\n              <span style=\"font-size:13.5px;line-height:1.45;color:#292B2E;\">{{ q.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"position:sticky;top:24px;{{ verdictCardStyle }}\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:{{ vAccent }};\">Recommendation<\u002Fdiv>\n            <span style=\"font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:{{ vAccent }};background:#fff;border-radius:100px;padding:3px 10px;\">{{ vTag }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:21px;font-weight:700;letter-spacing:-.01em;line-height:1.2;color:#292B2E;margin-bottom:12px;\">{{ vTitle }}<\u002Fdiv>\n          <div style=\"font-size:13.5px;color:#5a5a5a;line-height:1.65;\">{{ vDetail }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <details style=\"margin-top:28px;background:#fff;border:1px solid #E1E9EF;border-radius:16px;overflow:hidden;\">\n        <summary style=\"list-style:none;cursor:pointer;padding:16px 22px;font-size:13px;font-weight:600;color:#292B2E;display:flex;align-items:center;gap:10px;\"><span style=\"color:#E6485C;\">⊕<\u002Fspan> Reference — full decision criteria table<\u002Fsummary>\n        <div style=\"overflow-x:auto;border-top:1px solid #E1E9EF;\">\n          <sc-for list=\"{{ tableRows }}\" as=\"r\" hint-placeholder-count=\"12\">\n                <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:13px;\">\n            <thead><tr>\n              <th style=\"text-align:left;padding:13px 20px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#9B9B9B;background:#EDF9FE;border-bottom:1px solid #E1E9EF;\">Situation<\u002Fth>\n              <th style=\"text-align:left;padding:13px 20px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#9B9B9B;background:#EDF9FE;border-bottom:1px solid #E1E9EF;\">Mixed?<\u002Fth>\n              <th style=\"text-align:left;padding:13px 20px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#9B9B9B;background:#EDF9FE;border-bottom:1px solid #E1E9EF;\">Why<\u002Fth>\n            <\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr style=\"border-bottom:1px solid #E9F1F7;\">\n                  <td style=\"padding:14px 20px;color:#292B2E;font-weight:500;line-height:1.5;\">{{ r.situation }}<\u002Ftd>\n                  <td style=\"padding:14px 20px;\"><span style=\"{{ r.badgeStyle }}\">{{ r.verdict }}<\u002Fspan><\u002Ftd>\n                  <td style=\"padding:14px 20px;color:#6B6B6B;line-height:1.5;\">{{ r.why }}<\u002Ftd>\n                <\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fsection>\n\n    <!-- 04 WHAT IT EVALUATES -->\n    <section id=\"s4\" data-spy=\"\" data-screen-label=\"04 What it evaluates\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;\">\n        <div>\n          <div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>04 — Evaluation dimensions<\u002Fdiv>\n          <h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:560px;\">The ten dimensions it analyses<\u002Fh2>\n          <p style=\"font-size:15px;color:#6B6B6B;max-width:540px;line-height:1.7;margin-top:12px;\">Every project is read against these. Expand a dimension to see the questions the GEM asks.<\u002Fp>\n        <\u002Fdiv>\n        <button onclick=\"{{ toggleAllDims }}\" style=\"font-size:12px;font-weight:600;color:#292B2E;background:#fff;border:1px solid #E1E9EF;border-radius:9px;padding:9px 15px;cursor:pointer;white-space:nowrap;\">{{ allDimsLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:32px;\">\n        <sc-for list=\"{{ dimItems }}\" as=\"d\" hint-placeholder-count=\"10\">\n          <div style=\"background:#fff;border:1px solid #E1E9EF;border-radius:14px;overflow:hidden;\">\n            <div onclick=\"{{ d.onToggle }}\" style=\"display:flex;align-items:center;gap:16px;padding:17px 22px;cursor:pointer;\">\n              <span style=\"font-size:12px;font-weight:700;color:#E6485C;min-width:64px;letter-spacing:.02em;\">{{ d.num }}<\u002Fspan>\n              <span style=\"font-size:15px;font-weight:600;flex:1;color:#292B2E;\">{{ d.title }}<\u002Fspan>\n              <span style=\"{{ d.chevStyle }}\">⌄<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ d.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <div class=\"ddetail\" style=\"padding:2px 22px 20px 102px;\">\n                <sc-for list=\"{{ d.points }}\" as=\"p\" hint-placeholder-count=\"3\">\n                  <div style=\"font-size:13.5px;color:#6B6B6B;line-height:1.55;padding:7px 0 7px 16px;border-top:1px solid #E9F1F7;position:relative;\">\n                    <span style=\"position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:#F6C7CD;\"><\u002Fspan>{{ p }}\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 05 HOW IT WORKS -->\n    <section id=\"s5\" data-spy=\"\" data-screen-label=\"05 How it works\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;background:#EDF9FE;\">\n      <div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>05 — How it works<\u002Fdiv>\n      <h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:660px;\">The frameworks it applies<\u002Fh2>\n      <p style=\"font-size:15px;color:#6B6B6B;max-width:560px;line-height:1.7;margin:12px 0 32px;\">Pick a framework to see when to use it, its method sequence, and a worked example.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px;\">\n        <sc-for list=\"{{ fwItems }}\" as=\"f\" hint-placeholder-count=\"6\">\n          <div onclick=\"{{ f.onClick }}\" style=\"{{ f.cardStyle }}\">\n            <div style=\"font-size:22px;font-weight:700;color:#E6485C;letter-spacing:-.02em;line-height:1;margin-bottom:10px;\">{{ f.num }}<\u002Fdiv>\n            <div style=\"font-size:14.5px;font-weight:600;color:#292B2E;margin-bottom:6px;\">{{ f.name }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#6B6B6B;line-height:1.55;\">{{ f.short }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div class=\"ddetail\" style=\"background:#fff;border:1px solid #E1E9EF;border-radius:16px;padding:26px 28px;margin-top:14px;\" key=\"{{ currentFwId }}\">\n        <div style=\"display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:18px;\">\n          <span style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#E6485C;\">Selected framework<\u002Fspan>\n          <span style=\"font-size:19px;font-weight:700;letter-spacing:-.01em;color:#292B2E;\">{{ currentFwName }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:22px;\">\n          <sc-for list=\"{{ currentFwSteps }}\" as=\"st\" hint-placeholder-count=\"3\">\n            <span style=\"{{ st.style }}\">{{ st.label }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;\">\n          <div>\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9B9B9B;margin-bottom:8px;\">When to use<\u002Fdiv>\n            <div style=\"font-size:14px;color:#5a5a5a;line-height:1.65;\">{{ currentFwWhen }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9B9B9B;margin-bottom:8px;\">Example<\u002Fdiv>\n            <div style=\"font-size:14px;color:#5a5a5a;line-height:1.65;\">{{ currentFwExample }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px;\">\n        <div style=\"background:#FDE9EC;border:1px solid #F6C7CD;border-radius:16px;padding:24px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\">Patterns it challenges<\u002Fdiv>\n          <sc-for list=\"{{ challenges }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <div style=\"font-size:13px;color:#292B2E;line-height:1.55;padding:7px 0 7px 22px;border-top:1px solid rgba(230,72,92,.16);position:relative;\"><span style=\"position:absolute;left:0;top:7px;color:#E6485C;font-weight:700;font-size:12px;\">✕<\u002Fspan>{{ c }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#E8F6EC;border:1px solid #BFE6C9;border-radius:16px;padding:24px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#1B8E37;margin-bottom:14px;\">Patterns it promotes<\u002Fdiv>\n          <sc-for list=\"{{ promotes }}\" as=\"p\" hint-placeholder-count=\"6\">\n            <div style=\"font-size:13px;color:#292B2E;line-height:1.55;padding:7px 0 7px 22px;border-top:1px solid rgba(27,142,55,.16);position:relative;\"><span style=\"position:absolute;left:0;top:7px;color:#1B8E37;font-weight:700;font-size:12px;\">✓<\u002Fspan>{{ p }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 06 INPUT & PROMPT -->\n    <section id=\"s6\" data-spy=\"\" data-screen-label=\"06 Prompt builder\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;\">\n      <div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>06 — Prompt builder<\u002Fdiv>\n      <h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:660px;\">Build your input, copy a ready prompt<\u002Fh2>\n      <p style=\"font-size:15px;color:#6B6B6B;max-width:560px;line-height:1.7;margin:12px 0 32px;\">Fill what you have — the prompt assembles live on the right. The \"I need help with\" list pulls from the outputs you select in Section 07.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start;\">\n        <div style=\"display:flex;flex-direction:column;gap:16px;\">\n          <sc-for list=\"{{ fieldDefs }}\" as=\"fd\" hint-placeholder-count=\"6\">\n            <div>\n              <label style=\"display:block;font-size:12px;font-weight:600;color:#292B2E;margin-bottom:6px;\">{{ fd.label }}<\u002Flabel>\n              <textarea rows=\"{{ fd.rows }}\" value=\"{{ fd.value }}\" onchange=\"{{ fd.onInput }}\" placeholder=\"{{ fd.ph }}\" style=\"width:100%;background:#fff;border:1px solid #E1E9EF;border-radius:11px;padding:11px 13px;font-size:13px;color:#292B2E;line-height:1.55;outline:none;\" style-focus=\"border-color:#E6485C;box-shadow:0 0 0 3px #FDE9EC;\"><\u002Ftextarea>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"position:sticky;top:24px;background:#292B2E;border-radius:16px;overflow:hidden;\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #34343a;\">\n            <span style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9DA7AE;\">Assembled prompt<\u002Fspan>\n            <button onclick=\"{{ copyPrompt }}\" style=\"font-size:11px;font-weight:600;color:#fff;background:#E6485C;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;\">{{ copyPromptLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n          <pre style=\"margin:0;padding:20px;font-family:'DM Mono',monospace;font-size:11.5px;color:#d7d4d0;line-height:1.75;white-space:pre-wrap;word-break:break-word;max-height:560px;overflow-y:auto;\">{{ assembled }}<\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <details style=\"margin-top:44px;padding-top:28px;border-top:1px solid #E1E9EF;\">\n        <summary style=\"list-style:none;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;\">\n          <div>\n            <div style=\"font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:8px;\">06.1 — Worked example &amp; tips<\u002Fdiv>\n            <h3 style=\"font-size:19px;font-weight:700;letter-spacing:-.01em;color:#292B2E;\">A harder case: a methodological conflict<\u002Fh3>\n            <p style=\"font-size:14px;color:#6B6B6B;max-width:560px;line-height:1.65;margin-top:8px;\">A real example of the kind of input that gets the most out of the GEM — and what separates a weak answer from a strong one.<\u002Fp>\n          <\u002Fdiv>\n          <span style=\"flex:none;font-size:12px;font-weight:600;color:#292B2E;background:#fff;border:1px solid #E1E9EF;border-radius:9px;padding:9px 15px;white-space:nowrap;\">Show / hide<\u002Fspan>\n        <\u002Fsummary>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;\">\n        <div style=\"background:#EDF9FE;border:1px solid #E1E9EF;border-radius:16px;overflow:hidden;\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:13px 18px;border-bottom:1px solid #E1E9EF;\">\n            <span style=\"font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#6B6B6B;\">Applied example — methodological conflict<\u002Fspan>\n            <button onclick=\"{{ copyExample }}\" style=\"font-size:11px;font-weight:600;color:#E6485C;background:#FDE9EC;border:1px solid #F6C7CD;border-radius:8px;padding:5px 12px;cursor:pointer;\">{{ copyExampleLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"padding:18px;font-size:12.5px;color:#6B6B6B;line-height:1.75;white-space:pre-wrap;\">{{ exampleText }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:16px;\">\n          <div style=\"background:#FFF6D1;border:1px solid #F0DFA0;border-radius:14px;padding:18px 20px;\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#C06A00;margin-bottom:8px;\">Tip<\u002Fdiv>\n            <div style=\"font-size:13px;color:#5a5a5a;line-height:1.65;\"><b style=\"color:#292B2E;\">Include the conflicting hypotheses.<\u002Fb> When Growth says \"pricing,\" Design says \"hierarchy,\" and Product says \"clarity,\" that disagreement is the clearest signal mixed methods is right. The GEM uses those conflicts to build the triangulation strategy.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E1E9EF;border-radius:14px;padding:18px 20px;\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9B9B9B;margin-bottom:8px;\">Why the conflict case is the harder test<\u002Fdiv>\n            <div style=\"font-size:13px;color:#6B6B6B;line-height:1.6;\">A weak GEM picks a side or says \"do both.\" A strong GEM evaluates the uncertainty level first, explains why a survey without prior qual creates misleading options, and proposes a two-phase plan with stakeholder arguments.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fsection>\n\n    <!-- 07 OUTPUTS -->\n    <section id=\"s7\" data-spy=\"\" data-screen-label=\"07 Output types\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;background:#FFFCEE;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;\">\n        <div>\n          <div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>07 — Output types<\u002Fdiv>\n          <h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:560px;\">What the GEM can generate<\u002Fh2>\n          <p style=\"font-size:15px;color:#6B6B6B;max-width:540px;line-height:1.7;margin-top:12px;\">Select the outputs you need — they flow into the prompt builder's request list above.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;font-weight:600;color:#fff;background:#E6485C;border-radius:100px;padding:7px 15px;white-space:nowrap;\">{{ needsCount }} selected<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:32px;\">\n        <sc-for list=\"{{ outputItems }}\" as=\"o\" hint-placeholder-count=\"9\">\n          <div onclick=\"{{ o.onClick }}\" style=\"{{ o.cardStyle }}\">\n            <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;\">\n              <div style=\"font-size:20px;font-weight:700;color:#E6485C;letter-spacing:-.02em;\">{{ o.num }}<\u002Fdiv>\n              <span style=\"{{ o.tickStyle }}\">{{ o.tick }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13.5px;font-weight:600;color:#292B2E;margin-bottom:5px;line-height:1.35;\">{{ o.title }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:#6B6B6B;line-height:1.55;\">{{ o.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 08 QUALITY SIGNS -->\n    <section id=\"s8\" data-spy=\"\" data-screen-label=\"08 Quality signs\" style=\"padding:60px 56px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;\">\n        <div>\n          <div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>08 — Quality signs<\u002Fdiv>\n          <h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:560px;\">Is the GEM working well?<\u002Fh2>\n          <p style=\"font-size:15px;color:#6B6B6B;max-width:540px;line-height:1.7;margin-top:12px;\">If you see the \"needs work\" patterns, the prompt needs more context — not a different GEM.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:inline-flex;background:#E9F1F7;border-radius:10px;padding:3px;gap:3px;\">\n          <sc-for list=\"{{ filterBtns }}\" as=\"b\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ b.onClick }}\" style=\"{{ b.style }}\">{{ b.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:32px;\">\n        <sc-for list=\"{{ filteredSigns }}\" as=\"s\" hint-placeholder-count=\"6\">\n          <div style=\"{{ s.cardStyle }}\">\n            <div style=\"font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;color:{{ s.accent }};\">{{ s.marker }}<\u002Fdiv>\n            <div style=\"font-size:13.5px;font-weight:600;color:#292B2E;margin-bottom:5px;\">{{ s.title }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#6B6B6B;line-height:1.55;\">{{ s.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n    <\u002Fsection>\n\n    <section id=\"apart\" data-spy=\"\" data-screen-label=\"Part 02 Rigor Audit\" style=\"padding:64px 56px 56px;background:#292B2E;color:#fff;border-bottom:1px solid #E1E9EF;\">\n      <div style=\"display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#E6485C;background:rgba(230,72,92,.16);border-radius:100px;padding:5px 13px;margin-bottom:22px;\">Part 02 · Post-project QA<\u002Fdiv>\n      <div style=\"font-size:clamp(30px,4vw,48px);font-weight:700;line-height:1.08;letter-spacing:-.025em;max-width:760px;\">Mixed Methods <em style=\"color:#E6485C;font-style:italic;\">Rigor Audit.<\u002Fem><\u002Fdiv>\n      <p style=\"font-size:16px;color:rgba(255,255,255,.72);max-width:600px;line-height:1.7;margin-top:18px;\">A senior QA tool that audits completed research, evaluates evidence quality, challenges conclusions, and builds stronger Research Ops standards.<\u002Fp>\n      <div style=\"display:inline-flex;align-items:center;gap:9px;font-size:13px;font-weight:500;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:11px 16px;margin-top:24px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#E6485C;flex:none;\"><\u002Fspan>Use this only after a project or initiative has been completed.<\u002Fdiv>\n    <\u002Fsection>\n\n\n    <section id=\"a1\" data-spy=\"\" data-screen-label=\"a1\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;background:#EDF9FE;\">\n<div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>01 — What it is<\u002Fdiv>\n<h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:660px;color:#292B2E;\">A methodological quality partner, <em style=\"color:#E6485C;font-style:italic;\">not a gatekeeper<\u002Fem><\u002Fh2>\n<p style=\"font-size:15px;color:#6B6B6B;max-width:580px;line-height:1.7;margin:12px 0 32px;\">The Rigor Audit is a GEM configured as a strategic UX Research QA assistant. It audits <strong>completed<\u002Fstrong> research, evaluates evidence quality, and challenges whether conclusions are actually supported by the data — not just whether the methods sound reasonable.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n        <div style=\"background:#fff;border:1px solid #E1E9EF;border-radius:16px;padding:26px 24px;\">\n        <div style=\"font-size:26px;font-weight:700;color:#E6485C;letter-spacing:-.02em;line-height:1;margin-bottom:14px;\">01<span style=\"font-size:18px;\">.<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:15px;font-weight:600;margin-bottom:14px;color:#292B2E;\">Post-research audit<\u002Fdiv>\n        <div style=\"font-size:13px;color:#6B6B6B;line-height:1.55;padding:9px 0 9px 16px;border-top:1px solid #E9F1F7;position:relative;\"><span style=\"position:absolute;left:0;top:15px;width:6px;height:6px;border-radius:50%;background:#E6485C;\"><\u002Fspan>Audit completed research projects<\u002Fdiv><div style=\"font-size:13px;color:#6B6B6B;line-height:1.55;padding:9px 0 9px 16px;border-top:1px solid #E9F1F7;position:relative;\"><span style=\"position:absolute;left:0;top:15px;width:6px;height:6px;border-radius:50%;background:#E6485C;\"><\u002Fspan>Evaluate quality and validity of conclusions<\u002Fdiv><div style=\"font-size:13px;color:#6B6B6B;line-height:1.55;padding:9px 0 9px 16px;border-top:1px solid #E9F1F7;position:relative;\"><span style=\"position:absolute;left:0;top:15px;width:6px;height:6px;border-radius:50%;background:#E6485C;\"><\u002Fspan>Identify overclaiming and weak evidence chains<\u002Fdiv>\n      <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E1E9EF;border-radius:16px;padding:26px 24px;\">\n        <div style=\"font-size:26px;font-weight:700;color:#E6485C;letter-spacing:-.02em;line-height:1;margin-bottom:14px;\">02<span style=\"font-size:18px;\">.<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:15px;font-weight:600;margin-bottom:14px;color:#292B2E;\">Mixed methods QA<\u002Fdiv>\n        <div style=\"font-size:13px;color:#6B6B6B;line-height:1.55;padding:9px 0 9px 16px;border-top:1px solid #E9F1F7;position:relative;\"><span style=\"position:absolute;left:0;top:15px;width:6px;height:6px;border-radius:50%;background:#E6485C;\"><\u002Fspan>Detect inconsistencies between data sources<\u002Fdiv><div style=\"font-size:13px;color:#6B6B6B;line-height:1.55;padding:9px 0 9px 16px;border-top:1px solid #E9F1F7;position:relative;\"><span style=\"position:absolute;left:0;top:15px;width:6px;height:6px;border-radius:50%;background:#E6485C;\"><\u002Fspan>Evaluate triangulation depth and integration<\u002Fdiv><div style=\"font-size:13px;color:#6B6B6B;line-height:1.55;padding:9px 0 9px 16px;border-top:1px solid #E9F1F7;position:relative;\"><span style=\"position:absolute;left:0;top:15px;width:6px;height:6px;border-radius:50%;background:#E6485C;\"><\u002Fspan>Flag contradictions between methods<\u002Fdiv>\n      <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E1E9EF;border-radius:16px;padding:26px 24px;\">\n        <div style=\"font-size:26px;font-weight:700;color:#E6485C;letter-spacing:-.02em;line-height:1;margin-bottom:14px;\">03<span style=\"font-size:18px;\">.<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:15px;font-weight:600;margin-bottom:14px;color:#292B2E;\">Research Ops standards<\u002Fdiv>\n        <div style=\"font-size:13px;color:#6B6B6B;line-height:1.55;padding:9px 0 9px 16px;border-top:1px solid #E9F1F7;position:relative;\"><span style=\"position:absolute;left:0;top:15px;width:6px;height:6px;border-radius:50%;background:#E6485C;\"><\u002Fspan>Generate rigour scorecards<\u002Fdiv><div style=\"font-size:13px;color:#6B6B6B;line-height:1.55;padding:9px 0 9px 16px;border-top:1px solid #E9F1F7;position:relative;\"><span style=\"position:absolute;left:0;top:15px;width:6px;height:6px;border-radius:50%;background:#E6485C;\"><\u002Fspan>Build repeatable QA standards<\u002Fdiv><div style=\"font-size:13px;color:#6B6B6B;line-height:1.55;padding:9px 0 9px 16px;border-top:1px solid #E9F1F7;position:relative;\"><span style=\"position:absolute;left:0;top:15px;width:6px;height:6px;border-radius:50%;background:#E6485C;\"><\u002Fspan>Convert audits into reusable frameworks<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"a2\" data-spy=\"\" data-screen-label=\"a2\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;\">\n<div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>02 — Full description<\u002Fdiv>\n<h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:660px;color:#292B2E;\">What this GEM is configured to do<\u002Fh2>\n<p style=\"font-size:15px;color:#6B6B6B;max-width:580px;line-height:1.7;margin:12px 0 32px;\">The complete role description the GEM operates from. Note the focus: this tool audits <em style=\"color:#E6485C;font-style:italic;\">completed research<\u002Fem>, not just planning.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:1.15fr .85fr;gap:20px;align-items:start;\">\n        <div style=\"background:#fff;border:1px solid #E1E9EF;border-radius:16px;overflow:hidden;\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:13px 20px;border-bottom:1px solid #E1E9EF;background:#EDF9FE;\">\n            <span style=\"font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#6B6B6B;\">GEM description — Rigor Audit<\u002Fspan>\n          <\u002Fdiv>\n          <div id=\"audit-gem\" style=\"padding:22px 24px;font-size:13px;color:#6B6B6B;line-height:1.85;white-space:pre-wrap;\"><strong>Role:<\u002Fstrong> Strategic UX Research QA and methodological rigor assistant specialised in auditing completed research projects and evaluating the quality of mixed methods implementation in product teams.\n\n<strong>Helps assess:<\u002Fstrong>\n— Methodological rigor\n— Research quality\n— Evidence strength\n— Triangulation quality\n— Insight integration\n— Validity of conclusions\n— Actionability of findings\n— Consistency across research deliverables\n\n<strong>Designed to review research that has already been conducted<\u002Fstrong>, identifying methodological gaps, risks, biases, weak triangulation, overclaiming, and opportunities to improve future research standards and Research Ops practices.\n\n<strong>Ideal for:<\u002Fstrong>\n— Peer reviews\n— Research readout evaluations\n— Mixed methods validation\n— Methodological QA\n— Rigour scorecards\n— Triangulation assessment\n— Synthesis quality reviews\n— Research Ops standards\n— Post-research audits\n— Insight quality evaluation<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display:inline-flex;background:#E9F1F7;border-radius:10px;padding:3px;gap:3px;margin-bottom:14px;\">\n            <button onclick=\"{{ auditCmpBefore }}\" style=\"{{ auditCmpBtnBefore }}\">Before this GEM<\u002Fbutton>\n            <button onclick=\"{{ auditCmpAfter }}\" style=\"{{ auditCmpBtnAfter }}\">Now — the shift<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"ddetail\" style=\"{{ auditCmpCardStyle }}\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;color:{{ auditCmpAccent }};\">{{ auditCmpTag }}<\u002Fdiv>\n            <div style=\"font-size:16px;font-weight:600;color:#292B2E;line-height:1.45;margin-bottom:10px;\">{{ auditCmpQuote }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#6B6B6B;line-height:1.65;\">{{ auditCmpBody }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#EDF9FE;border:1px solid #E1E9EF;border-radius:14px;padding:16px 18px;margin-top:12px;\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#C06A00;margin-bottom:7px;\">Why it matters<\u002Fdiv>\n            <div style=\"font-size:13px;color:#6B6B6B;line-height:1.6;\">Senior rigor is not about whether the methods sounded reasonable — it is about whether the conclusions survive contact with the evidence.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"a3\" data-spy=\"\" data-screen-label=\"a3\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;background:#FFFCEE;\">\n<div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>03 — Decision criteria<\u002Fdiv>\n<h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:660px;color:#292B2E;\">When should you use it?<\u002Fh2>\n<p style=\"font-size:15px;color:#6B6B6B;max-width:580px;line-height:1.7;margin:12px 0 32px;\">Primary use case is auditing <strong>completed<\u002Fstrong> research — evaluating what was actually concluded against what the evidence supports. It also works for pre-research planning, but its highest value is post-execution.<\u002Fp>\n      <div style=\"border:1px solid #E1E9EF;border-radius:16px;overflow:hidden;\">\n        <table style=\"width:100%;border-collapse:collapse;font-size:13px;\">\n          <thead><tr><th style=\"text-align:left;padding:13px 20px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#9B9B9B;background:#EDF9FE;border-bottom:1px solid #E1E9EF;\">Situation<\u002Fth><th style=\"text-align:left;padding:13px 20px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#9B9B9B;background:#EDF9FE;border-bottom:1px solid #E1E9EF;\">Use it?<\u002Fth><th style=\"text-align:left;padding:13px 20px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#9B9B9B;background:#EDF9FE;border-bottom:1px solid #E1E9EF;\">What for<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr style=\"border-bottom:1px solid #E9F1F7;\"><td style=\"padding:14px 20px;color:#292B2E;font-weight:500;line-height:1.5;\">Research completed — before presenting findings<\u002Ftd><td style=\"padding:14px 20px;\"><span style=\"display:inline-block;padding:3px 11px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap;background:#E8F6EC;color:#1B8E37;\">Primary use<\u002Fspan><\u002Ftd><td style=\"padding:14px 20px;color:#6B6B6B;line-height:1.5;\">Audit conclusions, detect overclaiming, check evidence chain<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #E9F1F7;\"><td style=\"padding:14px 20px;color:#292B2E;font-weight:500;line-height:1.5;\">Mixed methods study — after fieldwork<\u002Ftd><td style=\"padding:14px 20px;\"><span style=\"display:inline-block;padding:3px 11px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap;background:#E8F6EC;color:#1B8E37;\">Primary use<\u002Fspan><\u002Ftd><td style=\"padding:14px 20px;color:#6B6B6B;line-height:1.5;\">Evaluate triangulation depth and insight integration quality<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #E9F1F7;\"><td style=\"padding:14px 20px;color:#292B2E;font-weight:500;line-height:1.5;\">Peer review before stakeholder readout<\u002Ftd><td style=\"padding:14px 20px;\"><span style=\"display:inline-block;padding:3px 11px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap;background:#E8F6EC;color:#1B8E37;\">Yes<\u002Fspan><\u002Ftd><td style=\"padding:14px 20px;color:#6B6B6B;line-height:1.5;\">Validate synthesis quality and actionability of findings<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #E9F1F7;\"><td style=\"padding:14px 20px;color:#292B2E;font-weight:500;line-height:1.5;\">Quick research with one clear method<\u002Ftd><td style=\"padding:14px 20px;\"><span style=\"display:inline-block;padding:3px 11px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap;background:#FFFCEE;color:#C06A00;\">Optional<\u002Fspan><\u002Ftd><td style=\"padding:14px 20px;color:#6B6B6B;line-height:1.5;\">Only if there is doubt about scope or conclusion validity<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"a4\" data-spy=\"\" data-screen-label=\"a4\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;\">\n        <div>\n          <div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>04 — Evaluation principles<\u002Fdiv>\n          <h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:660px;color:#292B2E;\">What every audit evaluates<\u002Fh2>\n          <p style=\"font-size:15px;color:#6B6B6B;max-width:580px;line-height:1.7;margin:12px 0 0;\">Every output is structured around seven evaluation dimensions. Expand one to see the questions the GEM asks.<\u002Fp>\n        <\u002Fdiv>\n        <button onclick=\"{{ toggleAllAP }}\" style=\"font-size:12px;font-weight:600;color:#292B2E;background:#fff;border:1px solid #E1E9EF;border-radius:9px;padding:9px 15px;cursor:pointer;white-space:nowrap;\">{{ allAPLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:32px;\">\n        <sc-for list=\"{{ apItems }}\" as=\"p\" hint-placeholder-count=\"7\">\n          <div style=\"background:#fff;border:1px solid #E1E9EF;border-radius:14px;overflow:hidden;\">\n            <div onclick=\"{{ p.onToggle }}\" style=\"display:flex;align-items:center;gap:16px;padding:17px 22px;cursor:pointer;\">\n              <span style=\"font-size:12px;font-weight:700;color:#E6485C;min-width:90px;letter-spacing:.02em;\">Principle {{ p.num }}<\u002Fspan>\n              <span style=\"font-size:15px;font-weight:600;flex:1;color:#292B2E;\">{{ p.title }}<\u002Fspan>\n              <span style=\"{{ p.chevStyle }}\">⌄<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ p.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <div class=\"ddetail\" style=\"padding:2px 22px 20px 128px;\">\n                <sc-for list=\"{{ p.points }}\" as=\"pt\" hint-placeholder-count=\"3\">\n                  <div style=\"font-size:13.5px;color:#6B6B6B;line-height:1.55;padding:7px 0 7px 16px;border-top:1px solid #E9F1F7;position:relative;\"><span style=\"position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:50%;background:#F6C7CD;\"><\u002Fspan>{{ pt }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"a5\" data-spy=\"\" data-screen-label=\"a5\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;background:#FDE9EC;\">\n<div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>05 — Audit framework<\u002Fdiv>\n<h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:660px;color:#292B2E;\">How every audit output is structured<\u002Fh2>\n<p style=\"font-size:15px;color:#6B6B6B;max-width:580px;line-height:1.7;margin:12px 0 32px;\">Every audit output follows the same eight sections, whatever the project. Click through them to understand what each one evaluates, what it contains, and why it belongs in the framework.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:264px 1fr;gap:16px;align-items:start;\">\n        <div style=\"display:flex;flex-direction:column;gap:4px;background:#fff;border:1px solid #E1E9EF;border-radius:14px;padding:10px;\">\n          <div style=\"font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9DA7AE;padding:8px 11px 6px;\">The eight output sections<\u002Fdiv>\n          <sc-for list=\"{{ reportNav }}\" as=\"r\" hint-placeholder-count=\"8\">\n            <div onclick=\"{{ r.onClick }}\" style=\"{{ r.navStyle }}\">\n              <span style=\"{{ r.numStyle }}\">{{ r.num }}<\u002Fspan>\n              <span style=\"font-size:13px;font-weight:600;line-height:1.25;color:#292B2E;\">{{ r.title }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E1E9EF;border-radius:16px;overflow:hidden;min-height:336px;\">\n          <div style=\"padding:20px 26px;border-bottom:1px solid #EEF1F4;background:#FAFCFE;\">\n            <div style=\"display:flex;align-items:center;gap:10px;\">\n              <span style=\"font-size:12px;font-weight:700;color:#E6485C;background:#FDE9EC;border-radius:7px;padding:4px 9px;\">{{ reportActive.num }}<\u002Fspan>\n              <span style=\"font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#9DA7AE;\">Output section<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:19px;font-weight:700;letter-spacing:-.01em;color:#292B2E;margin-top:10px;\">{{ reportActive.title }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#6B6B6B;line-height:1.55;margin-top:5px;\">{{ reportActive.sub }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:24px 26px;\">\n            <sc-if value=\"{{ reportActive.isProse }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;flex-direction:column;gap:18px;\">\n                <sc-for list=\"{{ reportActive.blocks }}\" as=\"b\" hint-placeholder-count=\"2\">\n                  <div>\n                    <div style=\"font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9B9B9B;margin-bottom:5px;\">{{ b.label }}<\u002Fdiv>\n                    <div style=\"font-size:14px;color:#3f4145;line-height:1.65;\">{{ b.text }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ reportActive.isRisks }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;flex-direction:column;gap:10px;\">\n                <sc-for list=\"{{ reportActive.risks }}\" as=\"rk\" hint-placeholder-count=\"4\">\n                  <div style=\"{{ rk.rowStyle }}\">\n                    <span style=\"{{ rk.sevStyle }}\">{{ rk.sev }}<\u002Fspan>\n                    <span style=\"font-size:13.5px;color:#3f4145;line-height:1.55;\">{{ rk.text }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ reportActive.isScore }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;flex-direction:column;gap:15px;\">\n                <sc-for list=\"{{ reportActive.scores }}\" as=\"sc\" hint-placeholder-count=\"6\">\n                  <div>\n                    <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;\">\n                      <span style=\"font-size:13.5px;font-weight:600;color:#292B2E;\">{{ sc.dim }}<\u002Fspan>\n                      <span style=\"{{ sc.valStyle }}\">{{ sc.valLabel }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"height:8px;background:#EEF1F4;border-radius:5px;overflow:hidden;\">\n                      <div style=\"{{ sc.barStyle }}\"><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"font-size:12px;color:#9B9B9B;border-top:1px solid #EEF1F4;padding-top:12px;\">Average {{ reportActive.avg }} / 5 \\u2014 strong collection, weak synthesis.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ reportActive.isConf }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;flex-direction:column;gap:18px;\">\n                <div style=\"display:flex;align-items:center;gap:16px;\">\n                  <span style=\"{{ reportActive.confBadge }}\">{{ reportActive.confLevel }}<\u002Fspan>\n                  <div style=\"display:flex;align-items:center;gap:8px;\">\n                    <span style=\"{{ reportActive.dotLow }}\"><\u002Fspan>\n                    <span style=\"{{ reportActive.dotMed }}\"><\u002Fspan>\n                    <span style=\"{{ reportActive.dotHigh }}\"><\u002Fspan>\n                    <span style=\"font-size:11px;color:#9DA7AE;margin-left:2px;\">low \\u00b7 med \\u00b7 high<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:14px;color:#3f4145;line-height:1.65;\">{{ reportActive.confText }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px;\">\n        <div style=\"background:#FDE9EC;border:1px solid rgba(230,72,92,.2);border-radius:16px;padding:24px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\">Mixed methods — what it detects<\u002Fdiv>\n          <ul style=\"margin:0;padding:0;\"><li style=\"font-size:13px;color:#292B2E;line-height:1.6;padding:6px 0 6px 20px;border-bottom:1px solid rgba(0,0,0,.06);position:relative;list-style:none;\"><span style=\"position:absolute;left:0;top:7px;color:#E6485C;font-size:11px;font-weight:700;\">✕<\u002Fspan>Decorative use of methods<\u002Fli><li style=\"font-size:13px;color:#292B2E;line-height:1.6;padding:6px 0 6px 20px;border-bottom:1px solid rgba(0,0,0,.06);position:relative;list-style:none;\"><span style=\"position:absolute;left:0;top:7px;color:#E6485C;font-size:11px;font-weight:700;\">✕<\u002Fspan>Quant used to incorrectly validate qual<\u002Fli><li style=\"font-size:13px;color:#292B2E;line-height:1.6;padding:6px 0 6px 20px;border-bottom:1px solid rgba(0,0,0,.06);position:relative;list-style:none;\"><span style=\"position:absolute;left:0;top:7px;color:#E6485C;font-size:11px;font-weight:700;\">✕<\u002Fspan>Missing integration between findings<\u002Fli><li style=\"font-size:13px;color:#292B2E;line-height:1.6;padding:6px 0 6px 20px;border-bottom:1px solid rgba(0,0,0,.06);position:relative;list-style:none;\"><span style=\"position:absolute;left:0;top:7px;color:#E6485C;font-size:11px;font-weight:700;\">✕<\u002Fspan>Superficial triangulation<\u002Fli><li style=\"font-size:13px;color:#292B2E;line-height:1.6;padding:6px 0 6px 20px;border-bottom:1px solid rgba(0,0,0,.06);position:relative;list-style:none;\"><span style=\"position:absolute;left:0;top:7px;color:#E6485C;font-size:11px;font-weight:700;\">✕<\u002Fspan>Redundant methods<\u002Fli><li style=\"font-size:13px;color:#292B2E;line-height:1.6;padding:6px 0 6px 20px;border-bottom:1px solid rgba(0,0,0,.06);position:relative;list-style:none;\"><span style=\"position:absolute;left:0;top:7px;color:#E6485C;font-size:11px;font-weight:700;\">✕<\u002Fspan>Absent methodological rationale<\u002Fli><\u002Ful>\n        <\u002Fdiv>\n        <div style=\"background:rgba(52,199,89,.08);border:1px solid rgba(52,199,89,.2);border-radius:16px;padding:24px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#1B8E37;margin-bottom:14px;\">Mixed methods — what it promotes<\u002Fdiv>\n          <ul style=\"margin:0;padding:0;\"><li style=\"font-size:13px;color:#292B2E;line-height:1.6;padding:6px 0 6px 20px;border-bottom:1px solid rgba(0,0,0,.06);position:relative;list-style:none;\"><span style=\"position:absolute;left:0;top:7px;color:#1B8E37;font-size:11px;font-weight:700;\">✓<\u002Fspan>Complementarity between methods<\u002Fli><li style=\"font-size:13px;color:#292B2E;line-height:1.6;padding:6px 0 6px 20px;border-bottom:1px solid rgba(0,0,0,.06);position:relative;list-style:none;\"><span style=\"position:absolute;left:0;top:7px;color:#1B8E37;font-size:11px;font-weight:700;\">✓<\u002Fspan>Logical methodological sequence<\u002Fli><li style=\"font-size:13px;color:#292B2E;line-height:1.6;padding:6px 0 6px 20px;border-bottom:1px solid rgba(0,0,0,.06);position:relative;list-style:none;\"><span style=\"position:absolute;left:0;top:7px;color:#1B8E37;font-size:11px;font-weight:700;\">✓<\u002Fspan>Real reduction of uncertainty<\u002Fli><li style=\"font-size:13px;color:#292B2E;line-height:1.6;padding:6px 0 6px 20px;border-bottom:1px solid rgba(0,0,0,.06);position:relative;list-style:none;\"><span style=\"position:absolute;left:0;top:7px;color:#1B8E37;font-size:11px;font-weight:700;\">✓<\u002Fspan>Narrative integration of findings<\u002Fli><li style=\"font-size:13px;color:#292B2E;line-height:1.6;padding:6px 0 6px 20px;border-bottom:1px solid rgba(0,0,0,.06);position:relative;list-style:none;\"><span style=\"position:absolute;left:0;top:7px;color:#1B8E37;font-size:11px;font-weight:700;\">✓<\u002Fspan>Convergent and divergent evidence<\u002Fli><li style=\"font-size:13px;color:#292B2E;line-height:1.6;padding:6px 0 6px 20px;border-bottom:1px solid rgba(0,0,0,.06);position:relative;list-style:none;\"><span style=\"position:absolute;left:0;top:7px;color:#1B8E37;font-size:11px;font-weight:700;\">✓<\u002Fspan>Confidence assessment per finding<\u002Fli><\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"a6\" data-spy=\"\" data-screen-label=\"a6\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;\">\n<div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>06 — Input &amp; prompt<\u002Fdiv>\n<h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:660px;color:#292B2E;\">Build your audit input, copy a ready prompt<\u002Fh2>\n<p style=\"font-size:15px;color:#6B6B6B;max-width:580px;line-height:1.7;margin:12px 0 32px;\">Fill what you have — the prompt assembles live on the right. The most important field is <strong>Results obtained<\u002Fstrong>: what each method actually showed, especially where sources contradict. The \"I need you to\" list pulls from the outputs you select in section 07.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start;\">\n        <div style=\"display:flex;flex-direction:column;gap:16px;\">\n          <sc-for list=\"{{ auditFieldDefs }}\" as=\"fd\" hint-placeholder-count=\"5\">\n            <div>\n              <label style=\"{{ fd.labelStyle }}\">{{ fd.label }}<\u002Flabel>\n              <textarea rows=\"{{ fd.rows }}\" value=\"{{ fd.value }}\" onchange=\"{{ fd.onInput }}\" placeholder=\"{{ fd.ph }}\" style=\"{{ fd.taStyle }}\" style-focus=\"border-color:#E6485C;box-shadow:0 0 0 3px #FDE9EC;\"><\u002Ftextarea>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"position:sticky;top:24px;background:#292B2E;border-radius:16px;overflow:hidden;\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #3a3a40;\">\n            <span style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9DA7AE;\">Assembled prompt<\u002Fspan>\n            <button onclick=\"{{ copyAuditPrompt }}\" style=\"font-size:11px;font-weight:600;color:#fff;background:#E6485C;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;\">{{ copyAuditPromptLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n          <pre style=\"margin:0;padding:20px;font-family:'DM Mono',monospace;font-size:11.5px;color:#d7d4d0;line-height:1.75;white-space:pre-wrap;word-break:break-word;max-height:560px;overflow-y:auto;\">{{ auditAssembled }}<\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <details style=\"margin-top:28px;background:#fff;border:1px solid #E1E9EF;border-radius:16px;overflow:hidden;\">\n        <summary style=\"list-style:none;cursor:pointer;padding:16px 22px;font-size:13px;font-weight:600;color:#292B2E;display:flex;align-items:center;gap:10px;\"><span style=\"color:#E6485C;\">⊕<\u002Fspan> Worked example — eSIM checkout abandonment<\u002Fsummary>\n        <div style=\"border-top:1px solid #E1E9EF;\">\n          <div style=\"display:flex;justify-content:flex-end;padding:10px 18px 0;\"><button onclick=\"{{ copyAuditEx }}\" style=\"font-size:11px;font-weight:600;color:#E6485C;background:#FDE9EC;border:1px solid #F6C7CD;border-radius:8px;padding:5px 12px;cursor:pointer;\">{{ copyAuditExLabel }}<\u002Fbutton><\u002Fdiv>\n          <div id=\"audit-ex\" style=\"padding:8px 24px 22px;font-size:12.5px;color:#6B6B6B;line-height:1.85;white-space:pre-wrap;word-break:break-word;font-family:'DM Mono',monospace;\">I need to audit a UX Research project that has already been completed.\n\n<strong>Context:<\u002Fstrong>\nThe team wanted to understand why users abandon the eSIM purchase before checkout.\n\n<strong>Stated objective:<\u002Fstrong>\n\"Understand the main reasons for abandonment.\"\n\n<strong>Methods used:<\u002Fstrong>\n— 15-question survey\n— 5 semi-structured interviews\n— Funnel analysis\n— Support ticket review\n\n<strong>Results obtained:<\u002Fstrong>\n— The survey showed \"price\" was the main reported reason\n— In interviews, users mentioned confusion about coverage and plan duration more than price\n— The funnel shows the biggest drop-off at plan selection\n— Support tickets show recurring doubts about activation and compatibility\n\n<strong>Conclusions the team drew:<\u002Fstrong>\n\"The main problem is pricing.\"\n\n<strong>I need you to:<\u002Fstrong>\n1. Audit the methodological soundness of the project\n2. Detect inconsistencies between sources\n3. Evaluate the quality of triangulation\n4. Detect overclaiming or weak conclusions\n5. Create a methodological rigor scorecard<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <div style=\"background:#EDF9FE;border:1px solid rgba(230,72,92,.15);border-left:4px solid #E6485C;border-radius:12px;padding:20px 22px;margin-top:20px;\">\n        <div style=\"font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:12px;\">Why this example is powerful<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n          <div><div style=\"font-size:12px;font-weight:600;color:#292B2E;margin-bottom:6px;\">Four data sources that contradict each other<\u002Fdiv><div style=\"font-size:12px;color:#6B6B6B;line-height:1.6;\">Survey → price. Interviews → confusion. Funnel → plan selection. Tickets → activation. The GEM will flag that the team picked one signal and ignored three others.<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:12px;font-weight:600;color:#292B2E;margin-bottom:6px;\">One conclusion that overclaims<\u002Fdiv><div style=\"font-size:12px;color:#6B6B6B;line-height:1.6;\">“The main problem is pricing” — stated as fact, supported only by survey self-report. The GEM will challenge the causality and surface the evidence gap.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#FFFCEE;border:1px solid #F0DFA0;border-radius:12px;padding:18px 22px;margin-top:16px;\">\n        <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#C06A00;margin-bottom:8px;\">Tip<\u002Fdiv>\n        <div style=\"font-size:13px;color:#5a5a5a;line-height:1.7;\"><b style=\"color:#292B2E;\">The most critical field is “Results obtained.”<\u002Fb> The GEM can only evaluate conclusion quality if it can see the gap between what the data showed and what the team claimed. Contradictions between methods are not a problem to hide — they are the most valuable input.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"a7\" data-spy=\"\" data-screen-label=\"a7\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;background:#EDF9FE;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;\">\n        <div>\n          <div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>07 — Output types<\u002Fdiv>\n          <h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:660px;color:#292B2E;\">What the GEM can generate<\u002Fh2>\n          <p style=\"font-size:15px;color:#6B6B6B;max-width:580px;line-height:1.7;margin:12px 0 0;\">Select the outputs you need — they flow into the prompt builder’s “Necesito que” list above.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;font-weight:600;color:#fff;background:#E6485C;border-radius:100px;padding:7px 15px;white-space:nowrap;\">{{ auditNeedsCount }} selected<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:32px;\">\n        <sc-for list=\"{{ auditOutputItems }}\" as=\"o\" hint-placeholder-count=\"9\">\n          <div onclick=\"{{ o.onClick }}\" style=\"{{ o.cardStyle }}\">\n            <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;\">\n              <div style=\"font-size:20px;font-weight:700;color:#E6485C;letter-spacing:-.02em;\">{{ o.num }}<\u002Fdiv>\n              <span style=\"{{ o.tickStyle }}\">{{ o.tick }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13.5px;font-weight:600;color:#292B2E;margin-bottom:5px;line-height:1.35;\">{{ o.title }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:#6B6B6B;line-height:1.55;\">{{ o.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"a8\" data-spy=\"\" data-screen-label=\"a8\" style=\"padding:60px 56px;border-bottom:1px solid #E1E9EF;\">\n<div style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;\">\n        <div>\n          <div style=\"display:inline-flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#E6485C;margin-bottom:14px;\"><span style=\"width:20px;height:2px;background:#E6485C;border-radius:2px;\"><\u002Fspan>08 — Quality check<\u002Fdiv>\n          <h2 style=\"font-size:clamp(22px,2.6vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.18;max-width:560px;color:#292B2E;\">Signs the GEM is working well<\u002Fh2>\n          <p style=\"font-size:15px;color:#6B6B6B;max-width:540px;line-height:1.7;margin-top:12px;\">If the output feels too generic, the input was missing the actual results. The GEM needs to see what each method showed \\u2014 and what the team concluded \\u2014 to produce genuinely senior output.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:inline-flex;background:#E9F1F7;border-radius:10px;padding:3px;gap:3px;\">\n          <sc-for list=\"{{ auditFilterBtns }}\" as=\"b\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ b.onClick }}\" style=\"{{ b.style }}\">{{ b.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:32px;\">\n        <sc-for list=\"{{ filteredAuditSigns }}\" as=\"s\" hint-placeholder-count=\"6\">\n          <div style=\"{{ s.cardStyle }}\">\n            <div style=\"font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;color:{{ s.accent }};\">{{ s.marker }}<\u002Fdiv>\n            <div style=\"font-size:13.5px;font-weight:600;color:#292B2E;margin-bottom:5px;\">{{ s.title }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#6B6B6B;line-height:1.55;\">{{ s.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ auditSignsEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:32px;display:flex;align-items:center;gap:13px;background:rgba(52,199,89,.08);border:1px solid rgba(52,199,89,.2);border-radius:14px;padding:22px 24px;\">\n          <span style=\"flex
