:none;width:30px;height:30px;border-radius:50%;background:#1B8E37;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;\">\\u2713<\u002Fspan>\n          <div style=\"font-size:13.5px;color:#3f4145;line-height:1.6;\">No \"needs work\" patterns in this list \\u2014 every item here is a sign the GEM is producing strong, senior output.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n    <footer style=\"padding:40px 56px;background:#292B2E;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;\">\n      <div style=\"font-size:20px;font-weight:700;letter-spacing:-.02em;color:#E6485C;\">Holafly<\u002Fdiv>\n      <div style=\"font-size:12px;color:rgba(255,255,255,.42);\">UX Research Team · Mixed Methods Guideline &amp; Rigor Audit · 2026 · Internal use only<\u002Fdiv>\n    <\u002Ffooter>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    active: 's1',\n    cmp: 'with',\n    dq: { q1:false,q2:false,q3:false,q4:false,q5:false,q6:false,q7:false,q8:false },\n    openDim: { d1:true },\n    fw: 'f1',\n    fields: { context:'', objective:'', questions:'', know:'', stakeholders:'', constraints:'' },\n    needs: { o1:true, o2:true, o3:true },\n    filter: 'all',\n    copiedPrompt:false, copiedGem:false, copiedExample:false,\n    copiedAuditGem:false, copiedAuditTpl:false, copiedAuditEx:false,\n    auditCmp:'after',\n    openAP:{ p1:true },\n    reportSec:'r1',\n    auditFields:{ context:'', objective:'', methods:'', results:'', conclusions:'' },\n    auditNeeds:{ ao1:true, ao2:true, ao3:true },\n    copiedAuditPrompt:false,\n    auditSignFilter:'all',\n  };\n\n  qualitySigns = [\n    {id:'qs1', title:'Detects contradictions between sources', text:'When one method points one way and another points elsewhere, and the team glosses over it — good output flags this as a triangulation failure, not a finding.'},\n    {id:'qs2', title:'Challenges conclusion-to-evidence gaps', text:'A claim stated as fact when only one method weakly supports it. Good output names the specific gap between what was claimed and what the evidence actually shows.'},\n    {id:'qs3', title:'Detects “method soup”', text:'When a plan lists multiple methods without explaining what each answers, it looks rigorous but has no connecting logic. Good output asks what each method is actually for.'},\n    {id:'qs4', title:'Questions premature surveys', text:'Surveys launched before the problem is understood lock in the wrong questions. Good output challenges surveys that appear before any exploratory research has shaped the hypotheses.'},\n    {id:'qs5', title:'Proposes a methodological sequence', text:'Methods should follow a logical order, not run in parallel without connection. Good output names which method goes first and what the next should build on.'},\n    {id:'qs6', title:'Enforces exploratory → explanatory flow', text:'Qualitative to understand what is happening and why — then quantitative to measure how often. Good output enforces this sequence and flags when it is inverted.'},\n    {id:'qs7', title:'Talks about real triangulation', text:'True triangulation uses different sources to confirm, contradict, or deepen a finding. Good output distinguishes this from simply collecting data from multiple places.'},\n    {id:'qs8', title:'Proposes evidence integration', text:'Good output recommends how to structure findings so qual and quant insights speak to each other — not two disconnected sections of a report.'},\n    {id:'qs9', title:'Identifies overclaiming', text:'“Users feel X” from five interviews, or “the majority do Y” from observation, are overclaims. Good output flags when conclusions exceed the evidence.'},\n    {id:'qs10', title:'Operationalises standards', text:'Rather than abstract advice, good output turns rigour into concrete, repeatable steps — checklists, scorecards, and criteria the team can apply every time.'},\n  ];\n\n  sections = [\n    {id:'s1',n:'01',label:'What it is'},\n    {id:'s2',n:'02',label:'Full description'},\n    {id:'s3',n:'03',label:'When to use it'},\n    {id:'s4',n:'04',label:'What it evaluates'},\n    {id:'s5',n:'05',label:'How it works'},\n    {id:'s6',n:'06',label:'Prompt builder'},\n    {id:'s7',n:'07',label:'Output types'},\n    {id:'s8',n:'08',label:'Quality signs'},\n  ];\n\n  auditSections = [\n    {id:'a1',n:'01',label:'What it is'},\n    {id:'a2',n:'02',label:'Full description'},\n    {id:'a3',n:'03',label:'When to use it'},\n    {id:'a4',n:'04',label:'Evaluation principles'},\n    {id:'a5',n:'05',label:'Audit framework'},\n    {id:'a6',n:'06',label:'Input & prompt'},\n    {id:'a7',n:'07',label:'Output types'},\n    {id:'a8',n:'08',label:'Quality check'},\n  ];\n\n  auditPrinciples = [\n    {id:'p1', num:'01', title:'Problem clarity', points:['Does the research respond to a concrete decision?','Is the problem well-defined?','Is there clarity between symptom vs cause?']},\n    {id:'p2', num:'02', title:'Methodological fit', points:['Does the method actually answer the question?','Was it chosen by convenience or by adequacy?','Are there methodological gaps?']},\n    {id:'p3', num:'03', title:'Uncertainty level', points:['Is the methodology coherent with current knowledge?','Is quantification being attempted too early?','Is exploration happening too late?']},\n    {id:'p4', num:'04', title:'Mixed methods quality', points:['Is there a clear logic for combining methods?','Do the methods complement each other?','Does real triangulation exist?','Is there integration \\u2014 or just coexistence?']},\n    {id:'p5', num:'05', title:'Evidence quality', points:['Are conclusions supported by evidence?','Traceability: data \\u2192 insight \\u2192 recommendation?','Is there overclaiming?']},\n    {id:'p6', num:'06', title:'Methodological risks', points:['Bias and insufficient samples','Leading questions and false causality','Premature validation and overclaiming','Weak triangulation and representativeness']},\n    {id:'p7', num:'07', title:'Actionability', points:['Do findings enable concrete decisions?','Is the output aligned to stakeholders?','Does the research reduce real uncertainty?']},\n  ];\n\n  auditReport = [\n    {id:'r1', num:'01', title:'Executive summary', sub:'The top-line verdict a stakeholder reads first.', kind:'prose', blocks:[\n      {label:'What it evaluates', text:'The overall health of the research at a glance \\u2014 the single judgement that has to stand on its own.'},\n      {label:'What you\\u2019ll find', text:'A top-line assessment of methodological soundness, the project\\u2019s current confidence level, and the one risk that matters most.'},\n      {label:'Why it matters', text:'Decision-makers rarely read the full audit; this section must carry the core message without the supporting detail.'},\n      {label:'How it contributes', text:'Frames everything that follows and signals up front how much weight the conclusions can bear.'},\n    ]},\n    {id:'r2', num:'02', title:'Problem evaluation', sub:'Was the question itself clear and answerable?', kind:'prose', blocks:[\n      {label:'What it evaluates', text:'Whether the research question was clearly defined, answerable, and tied to a real decision.'},\n      {label:'What you\\u2019ll find', text:'An assessment of how well the problem and hypotheses were framed, and how much uncertainty remained when conclusions were drawn.'},\n      {label:'Why it matters', text:'A vague or unfalsifiable question undermines every method that follows, however well executed.'},\n      {label:'How it contributes', text:'Establishes whether the study aimed at the right target before judging how it was carried out.'},\n    ]},\n    {id:'r3', num:'03', title:'Methodological evaluation', sub:'Were the methods right for the question?', kind:'prose', blocks:[\n      {label:'What it evaluates', text:'Whether each method chosen was appropriate for the question and competently designed.'},\n      {label:'What you\\u2019ll find', text:'The strengths of the chosen methods, the gaps they leave, and any mismatch between a method and what it was asked to prove.'},\n      {label:'Why it matters', text:'Method fit determines whether the data can actually support the claims being made of it.'},\n      {label:'How it contributes', text:'Separates problems of execution from problems of design, so fixes target the right layer.'},\n    ]},\n    {id:'r4', num:'04', title:'Mixed methods evaluation', sub:'How well were the methods combined, not just used?', kind:'prose', blocks:[\n      {label:'What it evaluates', text:'How well the different methods were combined, sequenced, and integrated \\u2014 not merely run in parallel.'},\n      {label:'What you\\u2019ll find', text:'An assessment of triangulation quality, the logic of the method sequence, and whether findings were genuinely integrated or only reported side by side.'},\n      {label:'Why it matters', text:'Mixed methods add value only when they reduce uncertainty together; weak integration creates a false sense of rigour.'},\n      {label:'How it contributes', text:'Judges the connective tissue of the study \\u2014 where multi-method projects most often break down.'},\n    ]},\n    {id:'r5', num:'05', title:'Methodological risks', sub:'What could make the conclusions wrong?', kind:'prose', blocks:[\n      {label:'What it evaluates', text:'The specific threats to validity \\u2014 biases, gaps, and overreach \\u2014 that could make the conclusions unreliable.'},\n      {label:'What you\\u2019ll find', text:'Risks classified by severity (high \\u2192 low), each tied to the concrete evidence gap or bias that creates it.'},\n      {label:'Why it matters', text:'Naming risks explicitly turns vague unease into something the team can prioritise and address.'},\n      {label:'How it contributes', text:'Converts the evaluation into a prioritised list of what to resolve before the findings are trusted.'},\n    ]},\n    {id:'r6', num:'06', title:'Actionable recommendations', sub:'What to do next, given the gaps found.', kind:'prose', blocks:[\n      {label:'What it evaluates', text:'What the team should do next in light of the gaps the audit surfaced.'},\n      {label:'What you\\u2019ll find', text:'Quick wins, higher-priority improvements, and alternative approaches when the ideal fix isn\\u2019t feasible.'},\n      {label:'Why it matters', text:'An audit that only diagnoses problems leaves the team stuck; recommendations make it usable.'},\n      {label:'How it contributes', text:'Turns the critique into a forward path the team can act on immediately.'},\n    ]},\n    {id:'r7', num:'07', title:'Confidence level', sub:'How much trust do the conclusions warrant?', kind:'prose', blocks:[\n      {label:'What it evaluates', text:'How much trust the conclusions actually warrant, and the reasoning behind that judgement.'},\n      {label:'What you\\u2019ll find', text:'An overall confidence rating (low / medium / high) with the rationale that justifies it.'},\n      {label:'Why it matters', text:'It tells stakeholders how firmly they can act on the findings \\u2014 and where caution is required.'},\n      {label:'How it contributes', text:'Calibrates expectations, preventing strong decisions from resting on weak evidence.'},\n    ]},\n    {id:'r8', num:'08', title:'Final scorecard', sub:'Rigour distilled into comparable dimensions.', kind:'prose', blocks:[\n      {label:'What it evaluates', text:'The project\\u2019s rigour broken down into comparable, rateable dimensions.'},\n      {label:'What you\\u2019ll find', text:'A 1\\u20135 rating across dimensions such as problem clarity, method fit, rigour, triangulation, evidence quality, and actionability.'},\n      {label:'Why it matters', text:'A structured score makes quality visible, comparable across projects, and trackable over time.'},\n      {label:'How it contributes', text:'Distils the entire audit into a single at-a-glance picture of where the work is strong and where it needs attention.'},\n    ]},\n  ];\n\n  auditOutputs = [\n    {id:'ao1', num:'01', title:'Methodological audit', desc:'Full review of method fit, gaps, and risks \\u2014 structured by problem clarity, methodology, and evidence quality.', need:'Audites la solidez metodol\\u00f3gica del proyecto'},\n    {id:'ao2', num:'02', title:'Rigour scorecard', desc:'1\\u20135 rating across six dimensions: problem clarity, method fit, rigour, triangulation, evidence quality, and actionability.', need:'Crees una scorecard de rigor metodol\\u00f3gico (1\\u20135 en seis dimensiones)'},\n    {id:'ao3', num:'03', title:'Triangulation framework', desc:'Structured table for crossing evidence between methods \\u2014 where findings converge, diverge, or deepen each other.', need:'Eval\\u00fces la calidad de la triangulaci\\u00f3n entre m\\u00e9todos'},\n    {id:'ao4', num:'04', title:'Recommended methodology', desc:'A restructured research design with logical sequencing: which method comes first and what each one builds on.', need:'Propongas una metodolog\\u00eda recomendada con secuencia l\\u00f3gica'},\n    {id:'ao5', num:'05', title:'Risk matrix', desc:'Risks classified as high, medium, or low \\u2014 covering bias, sample issues, premature quantification, and overclaiming.', need:'Identifiques riesgos metodol\\u00f3gicos y posibles sesgos'},\n    {id:'ao6', num:'06', title:'Reusable templates', desc:'Research plan structures, synthesis frameworks, and stakeholder summaries the team can apply independently.', need:'Conviertas el aprendizaje en plantillas reusables'},\n    {id:'ao7', num:'07', title:'Evaluation frameworks', desc:'Decision trees and criteria matrices for choosing when and how to combine methods in future projects.', need:'Crees un framework de evaluaci\\u00f3n para futuros proyectos'},\n    {id:'ao8', num:'08', title:'Peer review templates', desc:'Structured checklists the team can use to review each other\\u2019s research plans before fieldwork starts.', need:'Generes un checklist de peer review'},\n    {id:'ao9', num:'09', title:'Gap analysis', desc:'Identification of what is missing from the current research design and what evidence remains uncovered.', need:'Hagas un an\\u00e1lisis de gaps de evidencia'},\n  ];\n\n  selectedAuditNeeds() {\n    const sel = this.auditOutputs.filter(o => this.state.auditNeeds[o.id]);\n    if (!sel.length) return ['Audites la solidez metodol\\u00f3gica del proyecto','Eval\\u00fces la calidad de la triangulaci\\u00f3n entre m\\u00e9todos','Detectes overclaiming o conclusiones d\\u00e9biles'];\n    return sel.map(o => o.need);\n  }\n\n  auditAssemble() {\n    const f = this.state.auditFields;\n    const g = (v, ph) => v && v.trim() ? v.trim() : ph;\n    const needs = this.selectedAuditNeeds().map((n,i) => (i+1) + '. ' + n).join('\\n');\n    return [\n      'I need to audit a UX Research project that has already been completed.','',\n      'CONTEXT:', g(f.context, '[Product, team, and problem the research aimed to solve]'),'',\n      'STATED OBJECTIVE:', g(f.objective, '[What the team wanted to understand or validate \\u2014 in their own words]'),'',\n      'METHODS USED:', g(f.methods, '[Methods run \\u2014 surveys, interviews, analytics, tickets\\u2026 with sample sizes]'),'',\n      'RESULTS OBTAINED:', g(f.results, '[What each method showed \\u2014 including contradictions between sources]'),'',\n      'CONCLUSIONS THE TEAM DREW:', g(f.conclusions, '[What the team concluded \\u2014 exact wording from the readout or report]'),'',\n      'I NEED YOU TO:', needs,\n    ].join('\\n');\n  }\n\n  auditVals() {\n    const st = this.state;\n    const segBase = 'font-size:12px;font-weight:600;border:none;border-radius:8px;padding:7px 13px;cursor:pointer;transition:all .15s;';\n    const segOn = segBase + 'background:#fff;color:#292B2E;box-shadow:0 1px 3px rgba(0,0,0,.08);';\n    const segOff = segBase + 'background:transparent;color:#9B9B9B;';\n\n    const afterSel = st.auditCmp !== 'before';\n    const acmp = afterSel\n      ? { accent:'#1B8E37', bg:'rgba(52,199,89,.08)', bd:'rgba(52,199,89,.2)', tag:'Now \\u2014 the real shift', quote:'\\u201cAre the conclusions actually supported by the evidence?\\u201d', body:'Focused on completed research \\u2014 auditing what was concluded vs what the data actually shows. This is where senior rigor lives.' }\n      : { accent:'#E6485C', bg:'#FDE9EC', bd:'rgba(230,72,92,.2)', tag:'Before this GEM', quote:'\\u201cIs the methodology chosen correct?\\u201d', body:'Focused on planning \\u2014 evaluating methods before research happens. Useful, but limited in strategic impact.' };\n\n    const apOpenN = Object.values(st.openAP).filter(Boolean).length;\n    const apAllOpen = apOpenN >= this.auditPrinciples.length;\n    const apItems = this.auditPrinciples.map(p => {\n      const open = !!st.openAP[p.id];\n      return {\n        num:p.num, title:p.title, points:p.points, open,\n        onToggle: () => this.setState(s => ({ openAP: { ...s.openAP, [p.id]: !s.openAP[p.id] } })),\n        chevStyle: `font-size:18px;color:#A9B4BC;transition:transform .2s;display:inline-block;transform:rotate(${open?180:0}deg);`,\n      };\n    });\n\n    const auditOutputItems = this.auditOutputs.map(o => {\n      const sel = !!st.auditNeeds[o.id];\n      return {\n        num:o.num, title:o.title, desc:o.desc,\n        onClick: () => this.setState(s => ({ auditNeeds: { ...s.auditNeeds, [o.id]: !s.auditNeeds[o.id] } })),\n        tick: sel ? '\\u2713' : '+',\n        tickStyle: `flex:none;width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:${sel?'#fff':'#A9B4BC'};background:${sel?'#E6485C':'#E9F1F7'};`,\n        cardStyle: `background:#fff;border:1.5px solid ${sel?'#E6485C':'#E1E9EF'};border-radius:14px;padding:18px;cursor:pointer;transition:all .15s;box-shadow:${sel?'0 3px 14px rgba(230,72,92,.1)':'none'};`,\n      };\n    });\n    const auditNeedsCount = this.auditOutputs.filter(o => st.auditNeeds[o.id]).length;\n\n    // 05 interactive sample report\n    const sevMap = {\n      High:   { color:'#E6485C', bg:'#FDE9EC' },\n      Medium: { color:'#C06A00', bg:'#FFF3D6' },\n      Low:    { color:'#6B6B6B', bg:'#EEF1F4' },\n    };\n    const scoreColor = (v) => v <= 2 ? '#E6485C' : (v === 3 ? '#C58A00' : '#1B8E37');\n    const reportNav = this.auditReport.map(r => {\n      const sel = st.reportSec === r.id;\n      return {\n        num:r.num, title:r.title,\n        onClick: () => this.setState({ reportSec:r.id }),\n        navStyle: `display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;cursor:pointer;transition:background .12s;background:${sel?'#FDE9EC':'transparent'};`,\n        numStyle: `flex:none;width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${sel?'#fff':'#9DA7AE'};background:${sel?'#E6485C':'#EEF1F4'};`,\n      };\n    });\n    const ar = this.auditReport.find(r => r.id === st.reportSec) || this.auditReport[0];\n    const reportActive = {\n      num:ar.num, title:ar.title, sub:ar.sub,\n      isProse: ar.kind === 'prose', isRisks: ar.kind === 'risks', isScore: ar.kind === 'score', isConf: ar.kind === 'conf',\n      blocks: ar.blocks || [],\n      risks: (ar.risks || []).map(rk => {\n        const c = sevMap[rk.sev];\n        return {\n          sev:rk.sev, text:rk.text,\n          rowStyle: 'display:flex;gap:12px;align-items:flex-start;background:#FAFAFA;border:1px solid #EEF1F4;border-radius:11px;padding:13px 15px;',\n          sevStyle: `flex:none;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:${c.color};background:${c.bg};border-radius:6px;padding:3px 9px;margin-top:1px;min-width:58px;text-align:center;`,\n        };\n      }),\n      scores: (ar.scores || []).map(s => {\n        const c = scoreColor(s.val);\n        return {\n          dim:s.dim, valLabel:`${s.val} / 5`,\n          valStyle:`font-size:12.5px;font-weight:700;color:${c};`,\n          barStyle:`height:100%;width:${s.val/5*100}%;background:${c};border-radius:5px;transition:width .4s ease;`,\n        };\n      }),\n    };\n    if (ar.scores) {\n      const avg = (ar.scores.reduce((a,s)=>a+s.val,0)/ar.scores.length);\n      reportActive.avg = (Math.round(avg*10)/10).toString();\n    }\n    if (ar.kind === 'conf') {\n      reportActive.confLevel = ar.confLevel;\n      reportActive.confText = ar.confText;\n      reportActive.confBadge = 'font-size:14px;font-weight:700;color:#C06A00;background:#FFF3D6;border-radius:9px;padding:8px 16px;';\n      const dot = (on, color) => `width:12px;height:12px;border-radius:50%;background:${on?color:'#EEF1F4'};`;\n      reportActive.dotLow = dot(true, '#E6485C');\n      reportActive.dotMed = dot(true, '#C58A00');\n      reportActive.dotHigh = dot(false, '#1B8E37');\n    }\n\n    // 08 audit quality signs (filtered, mirrors section s8)\n    const aFilters = [{v:'all',l:'All'},{v:'good',l:'Good'},{v:'bad',l:'Needs work'}];\n    const auditFilterBtns = aFilters.map(f => {\n      const on = st.auditSignFilter === f.v;\n      return { label:f.l, onClick:() => this.setState({ auditSignFilter:f.v }), style: on ? segOn : segOff };\n    });\n    const filteredAuditSigns = this.qualitySigns\n      .filter(q => st.auditSignFilter === 'all' || st.auditSignFilter === (q.type || 'good'))\n      .map(q => {\n        const good = (q.type || 'good') === 'good';\n        return {\n          title:q.title, desc:q.text,\n          accent: good ? '#1B8E37' : '#E6485C',\n          marker: good ? '\\u2713 Working well' : '\\u2715 Needs work',\n          cardStyle: `background:#fff;border:1px solid #E1E9EF;border-left:3px solid ${good?'#34C759':'#E6485C'};border-radius:13px;padding:19px 20px;`,\n        };\n      });\n    const auditSignsEmpty = filteredAuditSigns.length === 0;\n\n    const F = st.auditFields;\n    const setAF = (k, v) => this.setState(s => ({ auditFields: { ...s.auditFields, [k]:v } }));\n    const auditFieldDefs = [\n      {key:'context', label:'1 \\u00b7 Context', rows:3, ph:'Product, team, and problem the research aimed to solve\\u2026', value:F.context, crit:false, onInput:e=>setAF('context', e.target.value)},\n      {key:'objective', label:'2 \\u00b7 Stated objective', rows:2, ph:'What the team wanted to understand or validate \\u2014 in their words', value:F.objective, crit:false, onInput:e=>setAF('objective', e.target.value)},\n      {key:'methods', label:'3 \\u00b7 Methods used', rows:2, ph:'Surveys, interviews, analytics, tickets\\u2026 with sample sizes', value:F.methods, crit:false, onInput:e=>setAF('methods', e.target.value)},\n      {key:'results', label:'\\u2605 Results obtained \\u00b7 critical', rows:4, ph:'What each method showed \\u2014 including contradictions between sources', value:F.results, crit:true, onInput:e=>setAF('results', e.target.value)},\n      {key:'conclusions', label:'4 \\u00b7 Team conclusions', rows:2, ph:'What the team concluded \\u2014 exact wording from the readout', value:F.conclusions, crit:false, onInput:e=>setAF('conclusions', e.target.value)},\n    ];\n    auditFieldDefs.forEach(fd => {\n      fd.labelStyle = `display:block;font-size:12px;font-weight:600;color:${fd.crit?'#1B8E37':'#292B2E'};margin-bottom:6px;`;\n      fd.taStyle = `width:100%;background:#fff;border:1px solid ${fd.crit?'rgba(52,199,89,.45)':'#E1E9EF'};border-radius:11px;padding:11px 13px;font-size:13px;color:#292B2E;line-height:1.55;outline:none;`;\n    });\n\n    return {\n      auditCmpBefore: () => this.setState({ auditCmp:'before' }),\n      auditCmpAfter: () => this.setState({ auditCmp:'after' }),\n      auditCmpBtnBefore: !afterSel ? segOn : segOff,\n      auditCmpBtnAfter: afterSel ? segOn : segOff,\n      auditCmpAccent: acmp.accent, auditCmpTag: acmp.tag, auditCmpQuote: acmp.quote, auditCmpBody: acmp.body,\n      auditCmpCardStyle: `background:${acmp.bg};border:1px solid ${acmp.bd};border-radius:16px;padding:24px;`,\n      apItems,\n      toggleAllAP: () => this.setState({ openAP: apAllOpen ? {} : Object.fromEntries(this.auditPrinciples.map(p => [p.id, true])) }),\n      allAPLabel: apAllOpen ? 'Collapse all' : 'Expand all',\n      auditOutputItems, auditNeedsCount,\n      reportNav, reportActive,\n      auditFilterBtns, filteredAuditSigns, auditSignsEmpty,\n      auditFieldDefs,\n      auditAssembled: this.auditAssemble(),\n      copyAuditPrompt: () => this.copy(this.auditAssemble(), 'copiedAuditPrompt'),\n      copyAuditPromptLabel: st.copiedAuditPrompt ? '\\u2713 Copied' : 'Copy prompt',\n    };\n  }\n\n  capabilities = [\n    {num:'01', title:'Research planning', items:['Define the right mix of methods for each problem','Structure methodological sequence and rationale','Write research questions and hypotheses']},\n    {num:'02', title:'Mixed methods design', items:['Recommend the right mixed methods framework','Design triangulation strategies','Integrate qualitative and quantitative evidence']},\n    {num:'03', title:'Research Ops', items:['Create reusable templates and decision frameworks','Build documentation standards for repositories','Develop scalable QA processes for the team']},\n  ];\n\n  dqDefs = [\n    {id:'q1', label:'I have quantitative signals but no explanation for them'},\n    {id:'q2', label:'Stakeholders disagree on the root cause'},\n    {id:'q3', label:'I need to validate qualitative findings at scale'},\n    {id:'q4', label:'I need to understand both what users do and why they do it'},\n    {id:'q5', label:'I\\u2019m making a high-impact product or business decision'},\n    {id:'q6', label:'I\\u2019m exploring a completely unknown problem space'},\n    {id:'q7', label:'I already have converging evidence from multiple sources'},\n    {id:'q8', label:'I just need a quick directional answer, or to track a known KPI'},\n  ];\n\n  tableRows = [\n    {situation:'You have quant signals but no explanation for them', verdict:'Yes', tone:'yes', why:'Quantitative data shows what is happening, while qualitative research helps explain why it is happening.'},\n    {situation:'Stakeholders disagree on the root cause', verdict:'Yes', tone:'yes', why:'Multiple sources of evidence help evaluate competing hypotheses and build alignment around findings.'},\n    {situation:'You need to validate qualitative findings at scale', verdict:'Yes', tone:'yes', why:'Qualitative research generates hypotheses and themes; quantitative research measures prevalence and confidence.'},\n    {situation:'You need to understand both what users do and why they do it', verdict:'Yes', tone:'yes', why:'Behavioural and attitudinal data complement each other, providing a more complete understanding of user behaviour.'},\n    {situation:'Neither qualitative nor quantitative methods alone can fully answer the research question', verdict:'Yes', tone:'yes', why:'Some questions require multiple forms of evidence to provide a complete and actionable answer.'},\n    {situation:'You\\u2019re making a high-impact product or business decision', verdict:'Often Yes', tone:'yes', why:'Triangulating evidence increases confidence in findings and reduces decision-making risk.'},\n    {situation:'You have a well-defined problem and one clear question', verdict:'Depends', tone:'opt', why:'If one method can answer the question sufficiently, mixed methods may add unnecessary complexity. However, some well-defined questions still benefit from multiple perspectives.'},\n    {situation:'You have very limited time and resources', verdict:'Evaluate carefully', tone:'opt', why:'Mixed methods require additional planning, execution, and synthesis. A well-executed single method is often preferable to a rushed mixed-methods study.'},\n    {situation:'You\\u2019re exploring a completely unknown problem space', verdict:'Start with qualitative research', tone:'low', why:'Qualitative methods help define the problem space, uncover needs, and generate hypotheses before deciding whether quantitative validation is necessary.'},\n    {situation:'You already have converging evidence from multiple existing data sources', verdict:'Probably not', tone:'no', why:'Additional methods may provide diminishing returns if the research question has already been answered with sufficient confidence.'},\n    {situation:'You need a quick directional answer to inform an immediate decision', verdict:'Probably not', tone:'no', why:'A focused method can often provide the needed insight faster and more efficiently than a mixed-methods approach.'},\n    {situation:'The goal is to measure a known KPI or benchmark over time', verdict:'Probably not', tone:'no', why:'Tracking established metrics is typically best served by a consistent quantitative approach rather than introducing additional methods.'},\n  ];\n\n  dims = [\n    {id:'d1', num:'Dim. 01', title:'Business objective', points:['What decision needs to be made?','Who are the stakeholders and what do they need?','What is at stake if the research is wrong?']},\n    {id:'d2', num:'Dim. 02', title:'Research objective', points:['What does the team want to understand?','Are the research questions clear and specific?','Are hypotheses defined or still open?']},\n    {id:'d3', num:'Dim. 03', title:'Research maturity & uncertainty', points:['How much does the team already know?','Is this exploratory, generative, or evaluative?','Is it too early to quantify?']},\n    {id:'d4', num:'Dim. 04', title:'Method-to-question fit', points:['Which method best answers each research question?','Is the method chosen for adequacy or convenience?','What gaps does each method leave?']},\n    {id:'d5', num:'Dim. 05', title:'Methodological sequence', points:['Which method should come first and why?','How does each method inform the next?','Is the sequence logical or arbitrary?']},\n    {id:'d6', num:'Dim. 06', title:'Triangulation strategy', points:['How will qual and quant evidence be combined?','What counts as convergence? What counts as contradiction?','How will divergent findings be handled?']},\n    {id:'d7', num:'Dim. 07', title:'Evidence quality', points:['Are samples appropriate for the research questions?','Are recruitment criteria aligned with objectives?','Is the evidence sufficient and trustworthy?']},\n    {id:'d8', num:'Dim. 08', title:'Insight integration & synthesis', points:['Are findings integrated or just listed?','Does the synthesis tell a coherent story?','Is the level of confidence calibrated?']},\n    {id:'d9', num:'Dim. 09', title:'Methodological risks', points:['Any risk of bias, leading questions, or false causality?','Is a stakeholder hypothesis overly influencing the design?','Are limitations and assumptions acknowledged?']},\n    {id:'d10', num:'Dim. 10', title:'Actionability & decision impact', points:['Do findings enable concrete decisions?','Are recommendations specific enough to act on?','Does the research reduce meaningful uncertainty?']},\n  ];\n\n  frameworks = [\n    {id:'f1', num:'01', name:'Sequential explanatory', short:'Quant first to find what & where, then qual to explain why.', seq:['Quant','Qual'], when:'Best when you have analytics signals but no explanation. The most common, reliable pattern for product research.', example:'Funnel drop-off spikes at checkout \\u2192 interview users who abandoned to learn why.'},\n    {id:'f2', num:'02', name:'Sequential exploratory', short:'Qual first to understand, then quant to test at scale.', seq:['Qual','Quant'], when:'Best when motivations are unclear and you need to generate hypotheses before measuring them.', example:'Interview churned users to surface reasons \\u2192 run a survey to size each reason.'},\n    {id:'f3', num:'03', name:'Triangulation (convergent)', short:'Run qual and quant in parallel, integrate at analysis.', seq:['Qual','+','Quant'], when:'Best when time is limited and the question needs both angles at once.', example:'Run a survey and usability sessions in parallel, then integrate findings at analysis.'},\n    {id:'f4', num:'04', name:'Embedded design', short:'One method leads; a second is embedded to enrich it.', seq:['Primary','+','Secondary'], when:'When one method is primary and a second adds depth within it.', example:'A usability test (primary) with a short post-task survey embedded (secondary).'},\n    {id:'f5', num:'05', name:'Triangulation framework', short:'Map each finding to its evidence and confidence level.', seq:['Finding','Quant','Qual','Confidence','Implication'], when:'The core synthesis tool \\u2014 a structured table making convergence and contradiction visible.', example:'Finding: users distrust pricing \\u00b7 Quant: 38% cite cost \\u00b7 Qual: 6/8 mention hidden fees \\u00b7 Confidence: High \\u00b7 Implication: surface total price earlier.'},\n    {id:'f6', num:'06', name:'Research Ops documentation', short:'Tagged, traceable record from insight to decision.', seq:['Insight','Evidence','Method','Decision'], when:'Make every project traceable and reusable \\u2014 builds institutional memory.', example:'Tag each insight with its evidence, method, and the decision it informed, in the repository.'},\n  ];\n\n  challenges = [\n    'Surveys used before hypotheses are defined',\n    'Quant used to \"validate\" qual (correlation \\u2260 causality)',\n    'Methods added without explaining what each answers',\n    'Overindexing on the most vocal stakeholder\\u2019s theory',\n    'Support tickets treated as a representative sample',\n    'Conflating symptom with cause',\n  ];\n  promotes = [\n    'Method-to-question fit before method selection',\n    'Logical sequence: exploratory before explanatory',\n    'Triangulation that integrates, not just compiles',\n    'Insight traceability: data \\u2192 insight \\u2192 recommendation',\n    'Calibrated confidence per finding',\n    'Reusable frameworks for future research',\n  ];\n\n  outputs = [\n    {id:'o1', num:'01', title:'Framework recommendation', desc:'Which approach fits \\u2014 explanatory, exploratory, triangulation, or embedded \\u2014 with rationale.'},\n    {id:'o2', num:'02', title:'Methodological design', desc:'Research questions, hypotheses, methods, sequencing, and the logic connecting each.'},\n    {id:'o3', num:'03', title:'Triangulation framework', desc:'Finding / quant source / qual source / confidence / implication. The core synthesis tool.'},\n    {id:'o4', num:'04', title:'Stakeholder presentation', desc:'How to present integrated findings and address each competing hypothesis with evidence.'},\n    {id:'o5', num:'05', title:'Risk matrix', desc:'Confirmation bias, false causality, overindexing on one source, weak triangulation.'},\n    {id:'o7', num:'06', title:'Decision tree', desc:'When to apply mixed methods, what sequence, and how to handle conflicting evidence.'},\n    {id:'o9', num:'07', title:'Conflict evaluation', desc:'Structured evaluation of each position with arguments, risks, and a pragmatic call.'},\n  ];\n\n  signs = [\n    {type:'good', title:'Calibrates confidence levels', desc:'Distinguishes between validated findings, directional evidence, assumptions, and open questions. Makes clear what is known, what is likely, and what still requires investigation.'},\n    {type:'bad', title:'Overstates certainty', desc:'Presents tentative evidence as fact or treats all findings as equally reliable. Creates a false sense of confidence that can lead to poor decisions.'},\n    {type:'good', title:'Evaluates uncertainty level first', desc:'Before recommending any method, the GEM assesses how much the team already knows and whether the problem is exploratory, generative, or evaluative.'},\n    {type:'bad', title:'\"Do interviews and a survey\"', desc:'Generic method recommendation without rationale, sequence logic, or any assessment of which question each method answers. Sounds helpful but adds nothing.'},\n    {type:'good', title:'Separates symptom from cause', desc:'The GEM distinguishes between observable behaviour (drop-off in funnel) and the explanations behind it (confusion, pricing concern, visual hierarchy). It won\\u2019t conflate the two.'},\n    {type:'bad', title:'Validates the loudest stakeholder', desc:'If Growth says \\u201cpricing\\u201d and the output designs research to confirm pricing \\u2014 without questioning that hypothesis \\u2014 it\\u2019s amplifying confirmation bias, not reducing it.'},\n    {type:'good', title:'Proposes a clear methodological sequence', desc:'Analytics \\u2192 interviews \\u2192 usability test, with an explicit reason why each comes in that order. Methods are ordered to build on each other, not run in parallel without logic.'},\n    {type:'bad', title:'No triangulation strategy', desc:'The output describes methods in isolation without explaining how findings from each will be combined, compared, or integrated into a coherent conclusion.'},\n    {type:'good', title:'Uses a triangulation table', desc:'Finding \\u2192 quant source \\u2192 qual source \\u2192 confidence level \\u2192 implication. Makes visible where evidence converges, where it contradicts, and where it needs more investigation.'},\n    {type:'bad', title:'Method-focused instead of decision-focused', desc:'Uses methodology terminology without connecting it to the product decision, stakeholder context, or what the team would actually do with the findings.'},\n    {type:'good', title:'Identifies methodological risks', desc:'Flags confirmation bias, correlation \\u2260 causality, sampling bias, and premature quantification before they become problems in the research.'},\n    {type:'bad', title:'Methods without rationale', desc:'Recommends methods but does not explain why each is needed, what question it answers, or how findings will be integrated.'},\n    {type:'good', title:'Prioritises recommendations', desc:'Focuses on the most valuable research activities given the project\\u2019s goals, timeline, resources, and uncertainty level.'},\n    {type:'bad', title:'No prioritisation', desc:'Gives a list of everything that could be done without indicating what matters most given the time, resources, and uncertainty level of the project.'},\n  ];\n\n  gemDesc = 'Role: You are a strategic UX Researcher at Holafly, specializing in Mixed Methods Research.\\n\\nMission: Helps design rigorous yet practical research approaches by combining qualitative and quantitative methods in a clear, scalable, and actionable way \\u2014 without unnecessary academic complexity.\\n\\nSupports: mixed methods frameworks \\u00b7 research planning \\u00b7 triangulation of insights \\u00b7 synthesis and reporting \\u00b7 research documentation \\u00b7 decision frameworks \\u00b7 reusable templates \\u00b7 Research Ops processes.\\n\\nImportant principle: Designed to help the team improve methodological consistency, evidence-based decision-making, and scalable research practices without unnecessary academic complexity by prioritizing pragmatism over academicism. The goal is to enable better product decisions.';\n\n  exampleText = 'I have a methodological conflict in a project.\\n\\nThe team wants to run a survey to understand why users do not renew their eSIMs after their first trip.\\n\\nI believe we first need qualitative research because we still do not fully understand users\\u2019 motivations, and we don\\u2019t know whether the survey options would accurately represent the real problem.\\n\\nHelp me:\\n\\u2014 Evaluate both positions methodologically\\n\\u2014 Identify the risks of each approach\\n\\u2014 Define the current level of uncertainty\\n\\u2014 Recommend a pragmatic mixed methods approach\\n\\u2014 Build clear arguments to present to stakeholders\\n\\u2014 Propose a realistic plan considering limited time';\n\n  componentDidMount() {\n    this._onScroll = () => {\n      if (this._raf) return;\n      this._raf = requestAnimationFrame(() => {\n        this._raf = null;\n        const ids = [...this.sections, ...this.auditSections].map(s => s.id);\n        let cur = ids[0];\n        for (const id of ids) {\n          const el = document.getElementById(id);\n          if (el && el.getBoundingClientRect().top <= 140) cur = id;\n        }\n        if (cur !== this.state.active) this.setState({ active: cur });\n      });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive:true });\n    this._onScroll();\n  }\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n  }\n\n  scrollTo(id) {\n    const el = document.getElementById(id);\n    if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 8, behavior:'smooth' });\n  }\n\n  setField(k, v) { this.setState(s => ({ fields: { ...s.fields, [k]:v } })); }\n  toggleDq(k) { this.setState(s => ({ dq: { ...s.dq, [k]: !s.dq[k] } })); }\n  toggleDim(k) { this.setState(s => ({ openDim: { ...s.openDim, [k]: !s.openDim[k] } })); }\n  toggleNeed(k) { this.setState(s => ({ needs: { ...s.needs, [k]: !s.needs[k] } })); }\n\n  copy(text, flag) {\n    try { navigator.clipboard.writeText(text); } catch(e){}\n    this.setState({ [flag]: true });\n    clearTimeout(this['_t_'+flag]);\n    this['_t_'+flag] = setTimeout(() => this.setState({ [flag]: false }), 1600);\n  }\n\n  verdict() {\n    const q = this.state.dq;\n    const yes = ['q1','q2','q3','q4','q5'].filter(k => q[k]).length;\n    const noCount = (q.q7?1:0) + (q.q8?1:0);\n    const any = Object.values(q).some(Boolean);\n    if (!any) return { tone:'neutral', tag:'Awaiting input', title:'Toggle the statements that fit', detail:'Select the situations that match your project. The recommendation updates live as you go.' };\n    if (q.q6) return { tone:'qual', tag:'Sequence note', title:'Start with qualitative research', detail:'Quantifying a problem space you don\\u2019t yet understand produces misleading data. Run exploratory qual to define the problem and generate hypotheses, then decide whether quantitative validation is needed.' };\n    if (yes >= 1) {\n      const note = noCount ? ' You also flagged signals that point the other way \\u2014 scope the mix tightly so it earns the added planning and synthesis effort.' : '';\n      return { tone:'mixed', tag:'Recommended', title:'Mixed methods is a good fit', detail:'You have signals that need explaining, competing hypotheses, findings to validate at scale, or a high-stakes decision \\u2014 exactly where combining qual and quant pays off. Design the sequence around which question each method answers.' + note };\n    }\n    if (noCount >= 1) return { tone:'single', tag:'Reconsider', title:'A single focused method is likely better', detail:'You already have converging evidence, need a quick directional answer, or are tracking a known metric. A well-executed single method is faster and less likely to add noise than a mixed design.' };\n    return { tone:'single', tag:'Reconsider', title:'Consider a single focused method', detail:'Nothing here strongly signals the need for multiple methods. Start with the one method that best answers your core question.' };\n  }\n\n  selectedNeeds() {\n    const sel = this.outputs.filter(o => this.state.needs[o.id]);\n    if (!sel.length) return ['Evaluate whether mixed methods is appropriate and why','Recommend the most suitable framework','Design a triangulation strategy'];\n    return sel.map(o => o.title);\n  }\n\n  assemble() {\n    const f = this.state.fields;\n    const g = (v, ph) => v && v.trim() ? v.trim() : ph;\n    const needs = this.selectedNeeds().map((n,i) => (i+1) + '. ' + n).join('\\n');\n    return [\n      '1. PROJECT CONTEXT',\n      g(f.context, '[What is happening? What quantitative or qualitative signals does the team already have? What decision is needed?]'),\n      '',\n      '2. RESEARCH OBJECTIVE',\n      g(f.objective, '[What does the team want to understand, and what decision must this research support?]'),\n      '',\n      '3. RESEARCH QUESTIONS',\n      g(f.questions, '\\u2014 [Question 1]\\n\\u2014 [Question 2]\\n\\u2014 [Question 3]'),\n      '',\n      '4. WHAT WE ALREADY KNOW',\n      g(f.know, '[Analytics \\u00b7 behavioural data \\u00b7 support tickets \\u00b7 previous research \\u00b7 session recordings]'),\n      '',\n      '5. STAKEHOLDERS & THEIR HYPOTHESES',\n      g(f.stakeholders, '\\u2014 [Team / Role]: [Hypothesis]\\n\\u2014 [Team / Role]: [Hypothesis]'),\n      '',\n      '6. CONSTRAINTS',\n      g(f.constraints, '[Timeline \\u00b7 team capacity \\u00b7 recruitment limits \\u00b7 technical or stakeholder dependencies]'),\n      '',\n      '7. I NEED HELP WITH',\n      needs,\n    ].join('\\n');\n  }\n\n  renderVals() {\n    const st = this.state;\n\n    const navItems = this.sections.map(s => {\n      const a = st.active === s.id;\n      return {\n        n: s.n, label: s.label,\n        onClick: () => this.scrollTo(s.id),\n        rowStyle: `display:flex;align-items:center;gap:11px;padding:8px 11px;border-radius:9px;cursor:pointer;transition:background .15s;background:${a?'#FDE9EC':'transparent'};`,\n        numStyle: `font-size:11px;font-weight:700;letter-spacing:.03em;min-width:18px;color:${a?'#E6485C':'#A9B4BC'};`,\n        labelStyle: `font-size:13px;font-weight:${a?600:500};color:${a?'#292B2E':'#6B6B6B'};white-space:nowrap;`,\n      };\n    });\n\n    // 02 comparison\n    const withSel = st.cmp === 'with';\n    const cmp = withSel\n      ? { accent:'#1B8E37', bg:'#E8F6EC', bd:'#BFE6C9', tag:'With the GEM', quote:'\\u201cUse analytics to find where, then interviews to understand why \\u2014 then triangulate.\\u201d', body:'A clear sequence, each method answering a specific question, with an integration strategy that produces evidence stakeholders can act on.' }\n      : { accent:'#E6485C', bg:'#FDE9EC', bd:'#F6C7CD', tag:'Without the GEM', quote:'\\u201cLet\\u2019s do interviews and a survey.\\u201d', body:'Methods chosen without rationale, no integration logic, no triangulation strategy. More methods, not better research.' };\n    const segBase = 'font-size:12px;font-weight:600;border:none;border-radius:8px;padding:7px 13px;cursor:pointer;transition:all .15s;';\n    const segOn = segBase + 'background:#fff;color:#292B2E;box-shadow:0 1px 3px rgba(0,0,0,.08);';\n    const segOff = segBase + 'background:transparent;color:#9B9B9B;';\n\n    // 03 decision\n    const dqItems = this.dqDefs.map(d => {\n      const on = st.dq[d.id];\n      return {\n        label: d.label,\n        check: on ? '\\u2713' : '',\n        onToggle: () => this.toggleDq(d.id),\n        rowStyle: `display:flex;align-items:flex-start;gap:13px;padding:14px 16px;border-radius:12px;cursor:pointer;border:1px solid ${on?'#F6C7CD':'#E1E9EF'};background:${on?'#FDE9EC':'#fff'};transition:all .15s;`,\n        boxStyle: `flex:none;width:21px;height:21px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-top:1px;color:#fff;border:1.5px solid ${on?'#E6485C':'#C2CDD5'};background:${on?'#E6485C':'#fff'};`,\n      };\n    });\n    const v = this.verdict();\n    const vTone = { mixed:'#1B8E37', qual:'#E6485C', single:'#C06A00', neutral:'#9B9B9B' }[v.tone];\n    const vBg = { mixed:'#E8F6EC', qual:'#FDE9EC', single:'#FFF6D1', neutral:'#fff' }[v.tone];\n    const vBd = { mixed:'#BFE6C9', qual:'#F6C7CD', single:'#F0DFA0', neutral:'#E1E9EF' }[v.tone];\n\n    const badgeMap = {\n      yes:'background:#E8F6EC;color:#1B8E37;', opt:'background:#FFF6D1;color:#C06A00;', low:'background:#FDE9EC;color:#E6485C;', no:'background:#E9F1F7;color:#697785;'\n    };\n    const tableRows = this.tableRows.map(r => ({\n      situation:r.situation, verdict:r.verdict, why:r.why,\n      badgeStyle:`display:inline-block;padding:3px 11px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap;${badgeMap[r.tone]}`,\n    }));\n\n    // 04 dims\n    const openVals = Object.values(st.openDim).filter(Boolean).length;\n    const allOpen = openVals >= this.dims.length;\n    const dimItems = this.dims.map(d => {\n      const open = !!st.openDim[d.id];\n      return {\n        num:d.num, title:d.title, points:d.points, open,\n        onToggle:() => this.toggleDim(d.id),\n        chevStyle:`font-size:18px;color:#A9B4BC;transition:transform .2s;display:inline-block;transform:rotate(${open?180:0}deg);`,\n      };\n    });\n\n    // 05 frameworks\n    const chipStyle = 'font-size:12.5px;font-weight:600;color:#E6485C;background:#FDE9EC;border-radius:8px;padding:6px 13px;';\n    const arrowStyle = 'font-size:15px;color:#A9B4BC;font-weight:600;';\n    const fwItems = this.frameworks.map(f => {\n      const sel = st.fw === f.id;\n      return {\n        num:f.num, name:f.name, short:f.short,\n        onClick:() => this.setState({ fw:f.id }),\n        cardStyle:`background:${sel?'#fff':'#fff'};border:1.5px solid ${sel?'#E6485C':'#E1E9EF'};border-radius:14px;padding:20px 20px;cursor:pointer;transition:all .15s;box-shadow:${sel?'0 4px 18px rgba(230,72,92,.12)':'none'};`,\n      };\n    });\n    const cf = this.frameworks.find(f => f.id === st.fw) || this.frameworks[0];\n    const currentFwSteps = [];\n    cf.seq.forEach((s, i) => {\n      if (i > 0) currentFwSteps.push({ label: s === '+' ? '+' : '\\u2192', style: arrowStyle });\n      if (s !== '+') currentFwSteps.push({ label:s, style:chipStyle });\n    });\n    // handle leading '+' patterns: rebuild cleanly\n    const steps2 = [];\n    cf.seq.forEach((s) => {\n      if (s === '+') { steps2.push({ label:'+', style:arrowStyle }); }\n      else {\n        if (steps2.length && steps2[steps2.length-1].style === chipStyle) steps2.push({ label:'\\u2192', style:arrowStyle });\n        steps2.push({ label:s, style:chipStyle });\n      }\n    });\n\n    // 06 builder\n    const F = st.fields;\n    const fieldDefs = [\n      {key:'context', label:'1 · Project context', rows:3, ph:'What is happening? What signals does the team already have? What decision is needed?', value:F.context, onInput:e=>this.setField('context', e.target.value)},\n      {key:'objective', label:'2 · Research objective', rows:2, ph:'What does the team want to understand, and what decision must it support?', value:F.objective, onInput:e=>this.setField('objective', e.target.value)},\n      {key:'questions', label:'3 · Research questions', rows:3, ph:'\\u2014 Question 1\\n\\u2014 Question 2', value:F.questions, onInput:e=>this.setField('questions', e.target.value)},\n      {key:'know', label:'4 · What we already know', rows:2, ph:'Analytics, behavioural data, support tickets, previous research\\u2026', value:F.know, onInput:e=>this.setField('know', e.target.value)},\n      {key:'stakeholders', label:'5 · Stakeholders & their hypotheses', rows:3, ph:'\\u2014 Growth: pricing\\n\\u2014 Design: hierarchy\\n\\u2014 Product: clarity', value:F.stakeholders, onInput:e=>this.setField('stakeholders', e.target.value)},\n      {key:'constraints', label:'6 · Constraints', rows:2, ph:'Timeline, team capacity, recruitment or technical limits\\u2026', value:F.constraints, onInput:e=>this.setField('constraints', e.target.value)},\n    ];\n\n    // 07 outputs\n    const outputItems = this.outputs.map(o => {\n      const sel = !!st.needs[o.id];\n      return {\n        num:o.num, title:o.title, desc:o.desc,\n        onClick:() => this.toggleNeed(o.id),\n        tick: sel ? '\\u2713' : '+',\n        tickStyle:`flex:none;width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:${sel?'#fff':'#A9B4BC'};background:${sel?'#E6485C':'#E9F1F7'};`,\n        cardStyle:`background:#fff;border:1.5px solid ${sel?'#E6485C':'#E1E9EF'};border-radius:14px;padding:18px 18px;cursor:pointer;transition:all .15s;box-shadow:${sel?'0 3px 14px rgba(230,72,92,.1)':'none'};`,\n      };\n    });\n    const needsCount = this.outputs.filter(o => st.needs[o.id]).length;\n\n    // 08 signs\n    const filters = [{v:'all',l:'All'},{v:'good',l:'Good'},{v:'bad',l:'Needs work'}];\n    const filterBtns = filters.map(f => {\n      const on = st.filter === f.v;\n      return { label:f.l, onClick:() => this.setState({ filter:f.v }), style: on ? segOn : segOff };\n    });\n    const filteredSigns = this.signs.filter(s => st.filter === 'all' || st.filter === s.type).map(s => {\n      const good = s.type === 'good';\n      return {\n        title:s.title, desc:s.desc,\n        accent: good ? '#1B8E37' : '#E6485C',\n        marker: good ? '\\u2713 Good output' : '\\u2715 Needs work',\n        cardStyle:`background:#fff;border:1px solid #E1E9EF;border-left:3px solid ${good?'#34C759':'#E6485C'};border-radius:13px;padding:19px 20px;`,\n      };\n    });\n\n    const auditNavItems = this.auditSections.map(s => {\n      const a = st.active === s.id;\n      return {\n        n: s.n, label: s.label,\n        onClick: () => this.scrollTo(s.id),\n        rowStyle: `display:flex;align-items:center;gap:11px;padding:8px 11px;border-radius:9px;cursor:pointer;transition:background .15s;background:${a?'#FDE9EC':'transparent'};`,\n        numStyle: `font-size:11px;font-weight:700;letter-spacing:.03em;min-width:18px;color:${a?'#E6485C':'#A9B4BC'};`,\n        labelStyle: `font-size:13px;font-weight:${a?600:500};color:${a?'#292B2E':'#6B6B6B'};white-space:nowrap;`,\n      };\n    });\n\n    return {\n      navItems,\n      auditNavItems,\n      ...this.auditVals(),\n      copyAuditGem: () => this.copy((document.getElementById('audit-gem')||{}).innerText||'', 'copiedAuditGem'),\n      copyAuditGemLabel: st.copiedAuditGem ? '\\u2713 Copied' : 'Copy',\n      copyAuditTpl: () => this.copy((document.getElementById('audit-tpl')||{}).innerText||'', 'copiedAuditTpl'),\n      copyAuditTplLabel: st.copiedAuditTpl ? '\\u2713 Copied' : 'Copy template',\n      copyAuditEx: () => this.copy((document.getElementById('audit-ex')||{}).innerText||'', 'copiedAuditEx'),\n      copyAuditExLabel: st.copiedAuditEx ? '\\u2713 Copied' : 'Copy example',\n      goCheck: () => this.scrollTo('s3'),\n      goBuild: () => this.scrollTo('s6'),\n      capabilities: this.capabilities,\n\n      gemDesc: this.gemDesc,\n      copyGem: () => this.copy(this.gemDesc, 'copiedGem'),\n      copyGemLabel: st.copiedGem ? '\\u2713 Copied' : 'Copy',\n      setCmpWith: () => this.setState({ cmp:'with' }),\n      setCmpWithout: () => this.setState({ cmp:'without' }),\n      cmpBtnWith: withSel ? segOn : segOff,\n      cmpBtnWithout: !withSel ? segOn : segOff,\n      cmpAccent: cmp.accent, cmpTag: cmp.tag, cmpQuote: cmp.quote, cmpBody: cmp.body,\n      cmpCardStyle:`background:${cmp.bg};border:1px solid ${cmp.bd};border-radius:16px;padding:22px;`,\n\n      dqItems,\n      verdictCardStyle:`background:${vBg};border:1px solid ${vBd};border-radius:16px;padding:24px;`,\n      vAccent: vTone, vTag: v.tag, vTitle: v.title, vDetail: v.detail,\n      tableRows,\n\n      dimItems,\n      toggleAllDims: () => this.setState({ openDim: allOpen ? {} : Object.fromEntries(this.dims.map(d => [d.id, true])) }),\n      allDimsLabel: allOpen ? 'Collapse all' : 'Expand all',\n\n      fwItems,\n      currentFwId: cf.id, currentFwName: cf.name, currentFwWhen: cf.when, currentFwExample: cf.example,\n      currentFwSteps: steps2,\n      challenges: this.challenges, promotes: this.promotes,\n\n      fieldDefs,\n      assembled: this.assemble(),\n      copyPrompt: () => this.copy(this.assemble(), 'copiedPrompt'),\n      copyPromptLabel: st.copiedPrompt ? '\\u2713 Copied' : 'Copy prompt',\n      exampleText: this.exampleText,\n      copyExample: () => this.copy(this.exampleText, 'copiedExample'),\n      copyExampleLabel: st.copiedExample ? '\\u2713 Copied' : 'Copy',\n\n      outputItems, needsCount,\n      filterBtns, filteredSigns,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
